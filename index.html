<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>CarreiraFUT Brasil Manager</title>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;600;700&family=Roboto+Condensed:wght@300;400;700&family=Roboto:wght@300;400;500&display=swap" rel="stylesheet">
<style>
/* ── Tokens ── */
:root {
  --bg:      #eef3f8;
  --bg2:     #ffffff;
  --bg3:     #f7fafd;
  --bg4:     #e9f1f8;
  --border:  rgba(17,47,78,.12);
  --border2: rgba(0,109,170,.24);
  --acc:     #0077cc;
  --gold:    #c69014;
  --grn:     #009f5a;
  --red:     #d7263d;
  --org:     #e67800;
  --pur:     #7c3aed;
  --txt:     #142033;
  --txt2:    #5d7188;
  --txt3:    #8aa0b5;
}

/* ── Reset ── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; overflow: hidden; background: var(--bg); color: var(--txt); font-family: Roboto, sans-serif; font-size: 13px; }
button, select, input, textarea { font-family: inherit; }
::-webkit-scrollbar { width: 5px; height: 5px; }
::-webkit-scrollbar-track { background: var(--bg2); }
::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 4px; }

/* ── Layout ── */
#root { display: flex; flex-direction: column; height: 100vh; width: 100vw; max-width: 100vw; }

/* ── Topbar ── */
#topbar {
  height: 54px;
  background: rgba(255,255,255,.90);
  border-bottom: 1px solid rgba(0,119,204,.18);
  box-shadow: 0 10px 34px rgba(31,72,110,.10);
  backdrop-filter: blur(14px);
  display: flex;
  align-items: stretch;
  flex-shrink: 0;
  z-index: 5;
}
.tb-logo {
  display: flex; align-items: center;
  padding: 0 24px 0 14px;
  background: linear-gradient(135deg, #0077cc, #38bdf8);
  clip-path: polygon(0 0, calc(100% - 14px) 0, 100% 100%, 0 100%);
  font-family: Oswald, sans-serif;
  font-size: 1.1rem; font-weight: 700;
  color: #fff; letter-spacing: 1.2px; white-space: nowrap;
}
.tb-seg { display: flex; align-items: center; padding: 0 14px; border-right: 1px solid var(--border); gap: 8px; min-width: 94px; }
.tb-seg.flex { flex: 1; min-width: 180px; }
.lbl { font-size: 9px; color: var(--txt3); text-transform: uppercase; letter-spacing: 1px; }
.val { font-family: Oswald, sans-serif; font-size: 1.05rem; color: var(--gold); }
.val.g { color: var(--grn); } .val.a { color: var(--acc); }
.tb-cname { font-family: Oswald, sans-serif; font-size: 1rem; font-weight: 600; }
.tb-csub  { font-size: 10px; color: var(--txt2); }

/* ── Nav ── */
#nav {
  background: rgba(255,255,255,.86);
  border-bottom: 1px solid rgba(17,47,78,.10);
  backdrop-filter: blur(12px);
  display: flex; overflow-x: auto; flex-shrink: 0;
}
#nav button {
  background: none; border: none; border-bottom: 2px solid transparent;
  color: var(--txt3);
  padding: 9px 14px; cursor: pointer; white-space: nowrap;
  font-family: 'Roboto Condensed', sans-serif;
  font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px;
  transition: color .15s, background .15s;
}
#nav button:hover  { color: var(--txt); background: rgba(0,119,204,.06); }
#nav button.active { color: var(--acc); background: rgba(0,119,204,.06); border-bottom-color: var(--acc); }

/* ── Main ── */
#main    { display: flex; flex: 1; overflow: hidden; min-width: 0; }
#sidebar { width: 230px; min-width: 230px; background: rgba(255,255,255,.72); border-right: 1px solid rgba(17,47,78,.10); display: flex; flex-direction: column; overflow-y: auto; }
#content { flex: 1; overflow-y: auto; overflow-x: hidden; padding: 14px; background: radial-gradient(circle at 70% 0%, rgba(0,119,204,.10), transparent 28%), linear-gradient(180deg, #f7fbff, #edf3f8); min-width: 0; scroll-behavior: smooth; }

/* ── Sidebar ── */
.sb-sec  { padding: 10px; border-bottom: 1px solid var(--border); }
.sb-ttl  { font-size: 9px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: var(--txt3); margin-bottom: 7px; }
.sb-next, .mini-card { background: var(--bg3); border-radius: 7px; padding: 10px; border: 1px solid var(--border); }
.sb-btn  { background: linear-gradient(135deg, #0077cc, #33b5e9); color: #fff; border: none; border-radius: 5px; cursor: pointer; font-family: 'Roboto Condensed', sans-serif; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; padding: 8px 14px; margin-top: 8px; width: 100%; transition: opacity .15s; }
.sb-btn:hover { opacity: .88; }

/* ── Badges / Tags ── */
.tag       { font-size: 9px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; padding: 2px 6px; border-radius: 3px; display: inline-block; }
.tag-A     { background: rgba(0,119,204,.12);  color: var(--acc); }
.tag-B     { background: rgba(124,58,237,.12); color: var(--pur); }
.tag-C     { background: rgba(230,120,0,.12);  color: var(--org); }
.tag-D     { background: rgba(198,144,20,.12); color: var(--gold); }
.tag-R     { background: rgba(0,159,90,.12);   color: var(--grn); }
.tag-COPA  { background: rgba(198,144,20,.15); color: var(--gold); }

/* ── Buttons ── */
.btn {
  border: none; border-radius: 10px; cursor: pointer;
  font-family: 'Roboto Condensed', sans-serif;
  font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px;
  transition: opacity .15s, transform .12s;
  display: inline-flex; align-items: center; justify-content: center; gap: 6px;
}
.btn:hover:not(:disabled) { opacity: .88; transform: translateY(-1px); }
.btn:disabled { opacity: .4; cursor: not-allowed; }
.bac { background: linear-gradient(135deg, #0077cc, #33b5e9); color: #fff; padding: 8px 14px; }
.bgd { background: linear-gradient(135deg, #f6c453, #ffd66b); color: #251a00; padding: 8px 14px; }
.bgr { background: linear-gradient(135deg, #00b96b, #40e39a); color: #002414; padding: 8px 14px; }
.brd { background: linear-gradient(135deg, #d7263d, #ff6b7a); color: #fff; padding: 8px 14px; }
.bpu { background: linear-gradient(135deg, #7c3aed, #a78bfa); color: #fff; padding: 8px 14px; }
.bgh { background: #f4f8fc; border: 1px solid rgba(17,47,78,.14); color: #52677e; padding: 7px 12px; }
.bgh:hover:not(:disabled) { color: var(--txt); border-color: var(--acc); }

/* ── Feed ── */
.fi          { padding: 5px 0; border-bottom: 1px solid rgba(0,0,0,.045); font-size: 11px; color: var(--txt2); line-height: 1.45; }
.fi .hi      { color: var(--txt); font-weight: 600; }
.fi .w       { color: var(--grn); }
.fi .l       { color: var(--red); }
.fi .g       { color: var(--gold); }
.fi .a       { color: var(--acc); }

/* ── Cards ── */
.card {
  background: rgba(255,255,255,.88);
  border: 1px solid var(--border);
  border-radius: 18px;
  padding: 14px;
  margin-bottom: 12px;
  box-shadow: 0 14px 38px rgba(31,72,110,.10);
  backdrop-filter: blur(10px);
  overflow: hidden;
  max-width: 100%;
}
.card:has(table) { overflow-x: auto; }
.card-hd    { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; padding-bottom: 10px; border-bottom: 1px solid var(--border); gap: 10px; }
.card-title { font-family: Oswald, sans-serif; font-size: 1rem; font-weight: 600; letter-spacing: .7px; display: flex; align-items: center; gap: 7px; }
.card-sub   { font-size: 11px; color: var(--txt2); }

/* ── Grids ── */
.g2  { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.g3  { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
.g4  { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
.gg  { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 12px; }

/* ── Stat boxes ── */
.sbox { background: rgba(255,255,255,.88); border: 1px solid var(--border); border-radius: 16px; padding: 12px; text-align: center; box-shadow: 0 14px 38px rgba(31,72,110,.10); }
.sbox .n { font-family: Oswald, sans-serif; font-size: 1.8rem; font-weight: 700; line-height: 1; }
.sbox .l { font-size: 10px; color: var(--txt2); margin-top: 4px; text-transform: uppercase; letter-spacing: .8px; }

/* ── Table ── */
.tbl        { width: 100%; border-collapse: collapse; min-width: 680px; }
.tbl th     { background: #eef5fb; color: var(--txt3); font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; padding: 7px; text-align: center; position: sticky; top: 0; z-index: 1; }
.tbl th:first-child, .tbl th:nth-child(2) { text-align: left; }
.tbl td     { padding: 6px 7px; text-align: center; border-bottom: 1px solid rgba(17,47,78,.06); font-size: 12px; }
.tbl td:nth-child(2) { text-align: left; }
.tbl tr:hover td   { background: rgba(0,119,204,.04); }
.tbl tr.meu td     { background: rgba(0,119,204,.08); }
.tbl tr.meu td:first-child { border-left: 3px solid var(--acc); }
.pts { font-family: Oswald, sans-serif; font-size: 1rem; color: var(--gold); font-weight: 700; }

/* ── Club chip ── */
.cc   { display: flex; align-items: center; gap: 6px; }
.cn   { font-family: 'Roboto Condensed', sans-serif; font-weight: 700; font-size: 12px; }
.badge { font-size: 1.15rem; }

/* ── Player states ── */
.plib { color: var(--grn); font-weight: 700; }
.psul { color: #26c6da; font-weight: 700; }
.prel { color: var(--red); font-weight: 700; }

/* ── Tabs ── */
.tabs { display: flex; border-bottom: 1px solid var(--border); margin-bottom: 12px; gap: 0; overflow-x: auto; }
.tab  { background: none; border: none; border-bottom: 2px solid transparent; margin-bottom: -1px; color: var(--txt3); padding: 8px 14px; cursor: pointer; font-family: 'Roboto Condensed', sans-serif; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; white-space: nowrap; transition: color .15s; }
.tab:hover  { color: var(--txt); }
.tab.active { color: var(--acc); border-bottom-color: var(--acc); }

/* ── Player rows ── */
.prow { display: flex; align-items: center; gap: 8px; padding: 6px 4px; border-bottom: 1px solid rgba(0,0,0,.04); border-radius: 4px; }
.prow:hover { background: rgba(0,0,0,.025); }
.pb   { font-size: 9px; font-weight: 700; padding: 2px 5px; border-radius: 3px; text-transform: uppercase; width: 34px; text-align: center; }
.pos-GOL { background: rgba(198,144,20,.18); color: var(--gold); }
.pos-ZAG { background: rgba(33,150,243,.18); color: #42a5f5; }
.pos-LAT { background: rgba(0,188,212,.18);  color: #26c6da; }
.pos-VOL { background: rgba(156,39,176,.18); color: #ba68c8; }
.pos-MEI { background: rgba(0,159,90,.18);   color: var(--grn); }
.pos-ATA { background: rgba(215,38,61,.18);  color: #ff5252; }
.pnm  { flex: 1; font-family: 'Roboto Condensed', sans-serif; font-weight: 700; font-size: 13px; }
.page { color: var(--txt3); font-size: 11px; width: 25px; }
.ovr  { font-family: Oswald, sans-serif; font-size: 1rem; font-weight: 700; padding: 2px 7px; border-radius: 4px; min-width: 34px; text-align: center; }
.oe   { background: rgba(198,144,20,.18); color: var(--gold); border: 1px solid rgba(198,144,20,.30); }
.oh   { background: rgba(0,159,90,.15);   color: var(--grn);  border: 1px solid rgba(0,159,90,.25); }
.om   { background: rgba(0,119,204,.12);  color: var(--acc);  border: 1px solid rgba(0,119,204,.22); }
.ol   { background: rgba(0,0,0,.05);      color: var(--txt2); border: 1px solid var(--border); }

/* ── Match broadcast ── */
.matchShell { display: grid; grid-template-columns: 1.35fr .85fr; gap: 14px; }
.broadcast {
  background: radial-gradient(circle at 50% 0%, rgba(0,119,204,.12), transparent 44%), linear-gradient(135deg, rgba(255,255,255,.96), rgba(246,250,254,.96));
  border: 1px solid rgba(0,119,204,.18);
  border-radius: 20px; padding: 18px;
  box-shadow: 0 20px 60px rgba(31,72,110,.14);
  overflow: hidden; position: relative;
}
.matchTop   { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
.matchBadge { font-size: 10px; text-transform: uppercase; letter-spacing: 2px; color: var(--txt2); }
.matchClock { font-family: Oswald, sans-serif; background: rgba(0,119,204,.08); border: 1px solid rgba(0,119,204,.18); border-radius: 999px; padding: 5px 12px; color: #006bb7; }
.matchScore { display: grid; grid-template-columns: 1fr auto 1fr; align-items: center; gap: 18px; }
.teamPanel  { text-align: center; }
.teamPanel .crest { font-size: 3.4rem; filter: drop-shadow(0 8px 18px rgba(31,72,110,.18)); }
.teamPanel .name  { font-family: Oswald, sans-serif; font-size: 1.35rem; font-weight: 700; margin-top: 4px; }
.teamPanel .meta  { font-size: 11px; color: var(--txt2); }
.scoreNums { font-family: Oswald, sans-serif; font-size: 4.8rem; font-weight: 700; letter-spacing: 4px; color: var(--txt); min-width: 190px; text-align: center; }
.livePill  { display: inline-flex; align-items: center; gap: 6px; background: rgba(215,38,61,.08); border: 1px solid rgba(215,38,61,.18); color: #b51f35; border-radius: 999px; padding: 4px 9px; font-size: 10px; text-transform: uppercase; letter-spacing: 1px; }
.livePill::before { content: ''; width: 7px; height: 7px; border-radius: 50%; background: var(--red); animation: pulse 1.2s infinite; }
@keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:.3; } }
.matchPitchMini {
  margin-top: 16px; height: 170px; border-radius: 16px;
  background: linear-gradient(90deg, rgba(255,255,255,.13) 1px, transparent 1px), linear-gradient(0deg, rgba(255,255,255,.10) 1px, transparent 1px), linear-gradient(180deg, #48aa68, #2c8f52);
  background-size: 38px 38px, 38px 38px, auto;
  border: 1px solid rgba(255,255,255,.13); position: relative; overflow: hidden;
}
.matchPitchMini::before { content: ''; position: absolute; inset: 14px; border: 1px solid rgba(255,255,255,.32); border-radius: 8px; }
.matchPitchMini::after  { content: ''; position: absolute; left: 50%; top: 14px; bottom: 14px; border-left: 1px solid rgba(255,255,255,.22); }
.dotBall { position: absolute; width: 16px; height: 16px; border-radius: 50%; background: #fff; box-shadow: 0 0 16px rgba(255,255,255,.8); left: 48%; top: 48%; transition: left .4s ease, top .4s ease; }
.managerPanel { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
.managerPanel .btn { width: 100%; padding: 10px; }
.statRow   { display: grid; grid-template-columns: 1fr 70px 1fr; gap: 8px; align-items: center; margin: 10px 0; }
.statName  { text-align: center; font-size: 10px; color: var(--txt2); text-transform: uppercase; letter-spacing: 1px; }
.bar       { height: 7px; border-radius: 20px; background: rgba(0,0,0,.08); overflow: hidden; }
.bar > div { height: 100%; background: linear-gradient(90deg, #0077cc, #009f5a); border-radius: 20px; }
.bar.right > div { margin-left: auto; background: linear-gradient(90deg, #c69014, #d7263d); }

/* ── Timeline ── */
.timeline    { height: 340px; overflow-y: auto; padding: 10px; border-radius: 14px; background: #f7fbff; border: 1px solid rgba(17,47,78,.09); }
.eventItem   { display: grid; grid-template-columns: 44px 1fr; gap: 10px; padding: 9px 0; border-bottom: 1px solid rgba(17,47,78,.07); }
.eventMin    { font-family: Oswald, sans-serif; color: var(--acc); text-align: right; }
.eventText   { font-size: 12px; color: var(--txt2); line-height: 1.45; }
.eventText b { color: var(--txt); }

/* ── Final panel ── */
.finalPanel { border-radius: 18px; border: 1px solid rgba(0,119,204,.16); padding: 16px; background: linear-gradient(135deg, rgba(0,119,204,.08), rgba(255,255,255,.9)); }

/* ── Pitch ── */
.pitch { background: linear-gradient(180deg, #48aa68, #2c8f52); border: 1px solid rgba(255,255,255,.15); border-radius: 8px; height: 465px; position: relative; overflow: hidden; }
.pitch::before { content: ''; position: absolute; inset: 18px; border: 1px solid rgba(255,255,255,.35); }
.pitch::after  { content: ''; position: absolute; left: 50%; top: 18px; bottom: 18px; border-left: 1px solid rgba(255,255,255,.25); }
.circle   { position: absolute; left: 50%; top: 50%; width: 110px; height: 110px; margin: -55px; border: 1px solid rgba(255,255,255,.25); border-radius: 50%; }
.pchip    { position: absolute; transform: translate(-50%, -50%); text-align: center; }
.pjer     { font-size: 1.4rem; }
.pname    { font-size: 10px; background: rgba(0,0,0,.55); border-radius: 4px; padding: 2px 5px; margin-top: 1px; white-space: nowrap; color: #fff; }

/* ── Kit ── */
.kit { height: 120px; border-radius: 12px; border: 1px solid var(--border2); background: var(--kitbg, #0057ff); display: flex; align-items: center; justify-content: center; font-family: Oswald, sans-serif; font-size: 2rem; color: #fff; text-shadow: 0 2px 8px #000; position: relative; overflow: hidden; }
.kit::after { content: attr(data-sponsor); position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 1rem; background: rgba(0,0,0,.35); padding: 4px 10px; border-radius: 5px; }

/* ── Form row ── */
.form-row   { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
.form-row label { width: 120px; color: var(--txt2); font-size: 11px; }
input[type=color] { width: 46px; height: 32px; background: transparent; border: 1px solid var(--border2); border-radius: 5px; padding: 2px; }
input[type=file]  { font-size: 11px; color: var(--txt2); }

/* ── Modal overlay ── */
.mov { position: fixed; inset: 0; background: rgba(0,0,0,.5); display: flex; align-items: center; justify-content: center; z-index: 50; backdrop-filter: blur(8px); }
.mdl { background: #fff; color: var(--txt); border: 1px solid rgba(17,47,78,.12); border-radius: 13px; padding: 24px; width: 680px; max-width: 96vw; max-height: 90vh; overflow-y: auto; box-shadow: 0 24px 90px rgba(0,0,0,.3); }
.mdl h2      { font-family: Oswald, sans-serif; font-size: 1.5rem; color: var(--acc); margin-bottom: 4px; }
.mdl p.sub   { color: var(--txt2); font-size: 12px; margin-bottom: 14px; }
.mdl select, .mdl input[type=text] { width: 100%; background: #f7fbff; border: 1px solid rgba(17,47,78,.14); color: var(--txt); padding: 10px 11px; border-radius: 6px; font-size: 13px; margin-bottom: 10px; }
.mdl select:focus, .mdl input:focus { outline: none; border-color: var(--acc); }

/* ── Steps / prev ── */
.step { font-size: 10px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; color: var(--txt3); margin-bottom: 6px; margin-top: 10px; }
.prev { background: var(--bg3); border: 1px solid var(--border); border-radius: 8px; padding: 14px; margin: 10px 0; }

/* ── News ── */
.news      { background: #f7fbff; border: 1px solid rgba(17,47,78,.09); border-radius: 14px; padding: 12px; margin-bottom: 10px; transition: box-shadow .2s; }
.news:hover { box-shadow: 0 8px 24px rgba(31,72,110,.10); }
.news-top  { display: flex; justify-content: space-between; gap: 8px; align-items: center; margin-bottom: 6px; }
.news h3   { font-family: Oswald, sans-serif; font-size: 1rem; margin-bottom: 5px; }
.news p    { font-size: 12px; color: var(--txt2); line-height: 1.55; }

/* ── Market card ── */
.mkc       { background: #f7fbff; border: 1px solid rgba(17,47,78,.09); border-radius: 7px; padding: 10px; margin-bottom: 8px; display: flex; align-items: center; gap: 10px; transition: border-color .15s; }
.mkc:hover { border-color: var(--acc); }
.mkp       { font-family: Oswald, sans-serif; font-size: 1.05rem; color: var(--grn); font-weight: 700; }

/* ── Meter ── */
.meter      { height: 7px; background: rgba(0,0,0,.08); border-radius: 6px; overflow: hidden; }
.meter > div { height: 100%; background: var(--acc); border-radius: 6px; transition: width .4s ease; }

/* ── Utility ── */
.small   { font-size: 11px; }
.muted   { color: var(--txt2); }
.bold    { font-weight: 700; }
.acc     { color: var(--acc); }
.gold    { color: var(--gold); }
.grn     { color: var(--grn); }
.red     { color: var(--red); }
.org     { color: var(--org); }
.dv      { height: 1px; background: var(--border); margin: 10px 0; }
.mt8     { margin-top: 8px; }
.mb8     { margin-bottom: 8px; }
.mt12    { margin-top: 12px; }
.hidden  { display: none !important; }
.frow    { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px solid rgba(17,47,78,.06); }

/* ── Notifications ── */
#notif    { position: fixed; top: 62px; right: 14px; z-index: 100; display: flex; flex-direction: column; gap: 7px; pointer-events: none; }
.notif    { background: #fff; border: 1px solid var(--border2); border-left: 4px solid var(--acc); border-radius: 8px; padding: 11px 14px; min-width: 270px; animation: sin .25s ease, sout .3s 3.8s forwards; box-shadow: 0 8px 30px rgba(0,0,0,.18); }
.notif.win  { border-left-color: var(--grn); }
.notif.loss { border-left-color: var(--red); }
.notif.gold { border-left-color: var(--gold); }
.notif .t   { font-family: Oswald, sans-serif; margin-bottom: 2px; }
.notif .s   { font-size: 11px; color: var(--txt2); }
@keyframes sin  { from { opacity: 0; transform: translateX(18px); } to { opacity: 1; transform: none; } }
@keyframes sout { to   { opacity: 0; transform: translateX(18px); } }

/* ── Status badges ── */

function makeSquad(c) {
  const positions = ['GOL','GOL','ZAG','ZAG','ZAG','LAT','LAT','LAT','VOL','VOL','MEI','MEI','MEI','ATA','ATA','ATA','ATA','MEI'];
  const first = ['João','Lucas','Rafael','Pedro','Gabriel','Bruno','Matheus','Felipe','Gustavo','Diego','Caio','Murilo','Thiago','Daniel','André','Vinícius','Otávio','Renan','Henrique','Samuel'];
  const last  = ['Silva','Souza','Oliveira','Santos','Pereira','Costa','Ferreira','Almeida','Rodrigues','Lima','Gomes','Ribeiro','Carvalho','Moura','Nunes','Rocha'];
  return positions.map((pos, idx) => {
    const ov  = clamp(c.overall + rand(-8, 5) + (idx < 11 ? 2 : 0), 42, 91);
    const age = rand(17, 35);
    const pot = clamp(ov + rand(-2, 12) - (age > 30 ? rand(2, 8) : 0), 45, 94);
    const mul = c.div === 'A' ? 55 : c.div === 'B' ? 28 : c.div === 'C' ? 12 : c.div === 'D' ? 5 : 2;
    const base = Math.round(ov * ov * ov * mul);
    return {
      id: players.length + idx + Math.random(),
      club: c.id,
      name: pick(first) + ' ' + pick(last),
      pos, age, ovr: ov, pot,
      moral: rand(45, 80), fit: rand(70, 100),
      value: base, salary: Math.round(base / 90),
      contract: 2025 + rand(1, 4),
      games: 0, goals: 0, assists: 0, avg: 6.5, trend: 0,
      history: [], family: rand(35,90), emotional: rand(35,90),
      professional: rand(35,90), leadership: rand(25,85),
      minutes: 0, injury: 0, suspended: 0, listed: false
    };
  });
}

function isAvailable(p) {
  return (!p.injury || p.injury <= 0)
      && (!p.suspended || p.suspended <= 0)
      && (!state?.liveMatch?.unavailable || !state.liveMatch.unavailable.includes(String(p.id)));
}

function unavailableLabel(p) {
  if (p.injury > 0)    return `<span class="statusBadge statusInj">DM ${p.injury}s</span>`;
  if (p.suspended > 0) return `<span class="statusBadge statusSusp">Suspenso</span>`;
  return '';
}

function injuredInMatchIcon(p) {
  return state?.liveMatch?.injuredOnPitch?.includes(String(p.id))
    ? '<span class="injuryCross">✚</span>' : '';
}

function lineupValidation() {
  const ps = myPlayers().filter(p => state.lineup.includes(p.id));
  const gk = ps.filter(p => p.pos === 'GOL').length;
  if (ps.length !== 11) return `Escalação inválida: precisa ter 11 jogadores. Atual: ${ps.length}.`;
  if (gk !== 1)         return `Escalação inválida: precisa ter exatamente 1 goleiro. Atual: ${gk}.`;
  if (ps.some(p => !isAvailable(p))) return 'Escalação inválida: há jogador lesionado, suspenso ou indisponível.';
  return '';
}

function topPlayers(list) {
  return list.sort((a, b) => b.ovr - a.ovr).slice(0, 5).map(p =>
    `<div class="prow">
       <span class="pb pos-${p.pos}">${p.pos}</span>
       <span class="pnm">${p.name}</span>
       <span class="page">${p.age}</span>
       <span class="ovr ${ovClass(p.ovr)}">${p.ovr}</span>
     </div>`
  ).join('');
}

function teamLineupAvg() {
  const ps = myPlayers().filter(p => state.lineup.includes(p.id));
  return avg(ps.map(p => p.ovr * .65 + p.moral * .2 + p.fit * .15));
}

function injuryType() {
  return pick([
    ['desconforto muscular', 1, 2],
    ['entorse leve no tornozelo', 2, 4],
    ['contratura na posterior', 2, 5],
    ['lesão muscular grau 1', 3, 6],
    ['entorse no joelho', 4, 8],
    ['lesão muscular grau 2', 6, 10]
  ]);
}

function registerInjury(p, teamName) {
  const it    = injuryType();
  const weeks = rand(it[1], it[2]);
  p.injury = weeks;
  p.fit    = clamp(p.fit - rand(18, 35), 10, 100);
  if (state.medical) state.medical.unshift({ player: p.name, type: it[0], weeks, round: state.round });
  addNews('Departamento Médico', `${p.name} tem ${it[0]}`,
    `${teamName} informou que ${p.name} sofreu ${it[0]} e ficará fora por ~${weeks} semana(s).`, 'info');
  addFeed(`<span class="l">${p.name}</span> sofreu ${it[0]}: ${weeks} semana(s) fora.`);
}

function applySuspensionsFromMatch(live) {
  (live.redPlayers || []).forEach(id => {
    const p = players.find(x => String(x.id) === String(id));
    if (p) {
      p.suspended = 1;
      addNews('Disciplina', `${p.name} está suspenso`,
        `${p.name} foi expulso e cumprirá suspensão na próxima partida.`, 'rodada');
    }
  });
}

function decayAbsences() {
  myPlayers().forEach(p => {
    if (p.injury > 0)    p.injury--;
    if (p.suspended > 0) p.suspended--;
  });
}

function evolvePlayerAfterMatch(p, played, highlight) {
  if (!played) return;
  if (p.age < 26 && p.ovr < p.pot && highlight && Math.random() < .12) p.ovr++;
  if (p.age > 33 && Math.random() < .06) p.ovr = Math.max(p.ovr - 1, 40);
}

function recalcValues() {
  players.forEach(p => {
    const c = club(p.club);
    if (!c) return;
    const mul       = c.div === 'A' ? 55 : c.div === 'B' ? 28 : c.div === 'C' ? 12 : c.div === 'D' ? 5 : 2;
    const base      = Math.round(p.ovr * p.ovr * p.ovr * mul);
    const ageFactor = p.age < 23 ? 1.15 : p.age > 30 ? Math.max(.6, 1 - (p.age - 30) * .06) : 1.0;
    p.value = Math.round(base * ageFactor);
  });
}

function developPlayers(silent = false) {
  myPlayers().forEach(p => {
    if (p.age < 24 && p.ovr < p.pot && Math.random() < .28) { p.ovr++; p.trend++; }
    if (p.age > 32 && Math.random() < .18)                   { p.ovr--; p.trend--; }
    p.fit = clamp(p.fit + rand(4, 12) - (p.injury ? 15 : 0), 20, 100);
    if (p.injury) p.injury--;
  });
  recalcValues();
  if (!silent) notify('Treino concluído', 'Elenco atualizado.', 'win');
  if (!silent && current === 'elenco') P('elenco');
}

function ensureYouth() {
  if (!state.youth) {
    state.youth = Array.from({ length: 8 }, () => ({
      name: pick(['João','Lucas','Davi','Enzo','Ruan','Caio','Breno','Miguel']) + ' ' +
            pick(['Silva','Souza','Lima','Pereira','Costa']),
      age: rand(15, 19),
      pos: pick(['GOL','ZAG','LAT','VOL','MEI','ATA']),
      ovr: rand(42, 58), pot: rand(62, 86), ready: rand(20, 80)
    }));
  }
}

/* =========================================================

   ========================================================= */
function applyTable(a, b, ga, gb) {
  if (!a.form) a.form = [];
  if (!b.form) b.form = [];
  a.j++; b.j++;
  a.gp += ga; a.gc += gb;
  b.gp += gb; b.gc += ga;
  if (ga > gb) {
    a.v++; b.d++; a.pts += 3;
    a.form.unshift('V'); b.form.unshift('D');
  } else if (ga < gb) {
    b.v++; a.d++; b.pts += 3;
    b.form.unshift('V'); a.form.unshift('D');
  } else {
    a.e++; b.e++; a.pts++; b.pts++;
    a.form.unshift('E'); b.form.unshift('E');
  }
  a.form = a.form.slice(0, 5);
  b.form = b.form.slice(0, 5);
}

function table(div) {
  return clubs.filter(c => c.div === div).sort((a, b) =>
    b.pts - a.pts || (b.gp - b.gc) - (a.gp - a.gc) || b.gp - a.gp || b.overall - a.overall
  );
}

function addLineup(id) {
  const p = myPlayers().find(x => String(x.id) === String(id));
  if (!p || !isAvailable(p)) { notify('Indisponível', 'Jogador indisponível para escalar.', 'loss'); return; }
  const current = myPlayers().filter(x => state.lineup.includes(x.id));
  if (p.pos === 'GOL' && current.some(x => x.pos === 'GOL')) { notify('Regra de escalação', 'Só pode haver 1 goleiro titular.', 'loss'); return; }
  if (state.lineup.length >= 11) state.lineup.shift();
  state.lineup.push(id);
  P('tatica');
}

function removeLineup(id) {
  state.lineup = state.lineup.filter(x => String(x) !== String(id));
  P('tatica');
}

function autoLineup() {
  const avail = myPlayers().filter(p => isAvailable(p));
  const gk    = avail.filter(p => p.pos === 'GOL').sort((a, b) => b.ovr - a.ovr)[0];
  const field = avail.filter(p => p.pos !== 'GOL').sort((a, b) => b.ovr - a.ovr).slice(0, 10);
  if (!gk || field.length < 10) { notify('Elenco indisponível', 'Não há jogadores disponíveis suficientes.', 'loss'); return; }
  state.lineup = [gk.id, ...field.map(p => p.id)];
  notify('Auxiliar técnico', 'Escalação montada com 1 goleiro e 10 jogadores de linha.', 'win');
  P('tatica');
}

/* =========================================================
   NEXT OPPONENT / CALENDAR HELPERS
   ========================================================= */
function nextOpponent() {
  const fx = currentFixture();
  if (fx) {
    const opp = club(fx.opp);
    if (!opp) return null;
    return { fixture: fx, opp, home: fx.home, dist: fx.dist, comp: fx.comp, label: fx.label, type: fx.type };
  }
  const c    = myClub();
  const same = clubs.filter(x => x.div === c.div && x.id !== c.id);
  if (!same.length) return null;
  const opp  = same[(state.round + c.id) % same.length];
  const dist = distance(c.estado, opp.estado);
  return { fixture: null, opp, home: state.round % 2 === 1, dist, comp: c.div, label: labelDiv(c.div), type: 'league' };
}

function currentFixture() {
  if (!state?.calendar) return null;
  return state.calendar.find(f => f.status === 'open' && f.playable !== false) || null;
}

function markFixtureDone(live) {
  if (!state?.calendar || !live?.n?.fixture?.id) return;
  const f = state.calendar.find(x => x.id === live.n.fixture.id);
  if (f) { f.status = 'done'; f.score = `${live.homeGoals} x ${live.awayGoals}`; }
}

function sameSlotFixtures(fx) {
  if (!state?.calendar || !fx) return [];
  return state.calendar.filter(f =>
    f.id !== fx.id && f.round === fx.round && f.comp === fx.comp && f.status === 'done'
  ).slice(0, 5);
}

function distance(a, b) {
  if (a === b) return rand(35, 260);
  const far = { AM:2500, PA:2100, CE:1800, PE:1900, RS:1100, SC:750, PR:480, RJ:430, MG:520, GO:850, BA:1600, MA:2200, PI:2100, MT:1400, RN:2100, AL:2000, PB:2000, SE:1900 };
  return Math.abs((far[a] || 800) - (far[b] || 800)) + rand(250, 800);
}

/* =========================================================
   LOGISTICS
   ========================================================= */
function calcLog(n = nextOpponent()) {
  const c = myClub();
  if (!n || n.home) return { cost:0, fatigue:0, emotional:1, note:'Jogo em casa: sem custo de viagem.' };
  const l     = state.logistic;
  const porte = c.div === 'A' ? .9 : c.div === 'B' ? .75 : c.div === 'C' ? .55 : c.div === 'D' ? .42 : .3;
  const trans  = { bus_club:[2.2,12], bus_rent:[4.5,8], plane_com:[18,4], plane_charter:[48,1] }[l.transport];
  const hotel  = { economic:[90,-5], standard:[180,0], executive:[320,4], premium:[650,8] }[l.hotel];
  const food   = { basic:[55,-2], standard:[100,0], nutrition:[190,3] }[l.food];
  const people = 32;
  const days   = n.dist > 1000 ? 3 : n.dist > 500 ? 2 : 1;
  const cost   = Math.round((n.dist * trans[0] * people / 10 + hotel[0] * people * days + food[0] * people * days) * porte);
  const fatigue    = Math.round((n.dist / 350 + trans[1] + days * 1.4) * porte);
  const emotional  = Math.round((hotel[1] + food[1] - days * 1.2 - (n.dist > 1200 ? 2 : 0)) * (c.div === 'A' ? .6 : porte));
  return { cost, fatigue, emotional, note: `Logística aplicada. ${days} dia(s) fora de casa.` };
}

function logistica() {
  const n   = nextOpponent();
  const log = calcLog(n);
  const opt = (arr, val) => arr.map(x => `<option ${x[0]===val?'selected':''} value="${x[0]}">${x[1]}</option>`).join('');
  document.getElementById('content').innerHTML = `
    <div class="card">
      <div class="card-hd"><div><div class="card-title">✈️ Logística da Viagem</div><div class="card-sub">Afeta caixa, físico e moral.</div></div></div>
      <div class="g2">
        <div>
          <div class="step">Transporte</div>
          <select onchange="state.logistic.transport=this.value;P('logistica')">${opt([['bus_club','Ônibus do clube'],['bus_rent','Ônibus fretado'],['plane_com','Avião comercial'],['plane_charter','Avião fretado']],state.logistic.transport)}</select>
          <div class="step">Hotel</div>
          <select onchange="state.logistic.hotel=this.value;P('logistica')">${opt([['economic','Econômico'],['standard','Padrão'],['executive','Executivo'],['premium','Premium']],state.logistic.hotel)}</select>
          <div class="step">Alimentação</div>
          <select onchange="state.logistic.food=this.value;P('logistica')">${opt([['basic','Básica'],['standard','Padrão'],['nutrition','Nutrição premium']],state.logistic.food)}</select>
        </div>
        <div>
          <div class="g2">
            <div class="sbox"><div class="n">${BRL(log.cost)}</div><div class="l">Custo</div></div>
            <div class="sbox"><div class="n">${log.fatigue}</div><div class="l">Desgaste</div></div>
            <div class="sbox"><div class="n">${log.emotional > 0 ? '+' : ''}${log.emotional}</div><div class="l">Emocional</div></div>
            <div class="sbox"><div class="n">${n ? n.dist : '—'}</div><div class="l">Km</div></div>
          </div>
          <div class="mini-card mt12">${log.note}</div>
        </div>
      </div>
    </div>`;
}

/* BUG FIX #4: live.added agora é definido corretamente */
function startLiveMatch() {
  const n   = nextOpponent();
  const log = calcLog(n);
  const c   = myClub();
  if (!n) { notify('Sem adversário', 'Nenhum jogo disponível.', 'loss'); return; }
  if (c.cash < log.cost) { notify('Caixa insuficiente', 'A logística custa mais do que o clube tem.', 'loss'); return; }
  c.cash -= log.cost;
  state.finance.push(['Despesa logística', -log.cost]);

  // BUG FIX #9: limpar lineup antes de revalidar
  state.lineup = state.lineup.filter(id => {
    const p = myPlayers().find(x => String(x.id) === String(id));
    return p && isAvailable(p);
  });
  const invalid = lineupValidation();
  if (invalid) { notify('Escalação inválida', invalid, 'loss'); P('tatica'); return; }

  const homeTeam = n.home ? c : n.opp;
  const awayTeam = n.home ? n.opp : c;

  state.liveMatch = {
    n, log,
    homeTeam: homeTeam.id,
    awayTeam: awayTeam.id,
    minute: 0, half: 1, phase: 'first',
    // BUG FIX #4: definir added corretamente
    firstAdded:  rand(1, 4),
    secondAdded: rand(2, 7),
    added: rand(1, 4),   // usado no 1º tempo; será atualizado no intervalo
    homeGoals: 0, awayGoals: 0,
    finished: false, confirmed: false, postShown: false, halftimeShown: false,
    mentality: 'equilibrada', subs: 0,
    ballX: 48, ballY: 48,
    unavailable: [], redPlayers: [], injuredOnPitch: [], injuryHappened: false,
    stats: { posHome:50, shotsHome:0, shotsAway:0, onHome:0, onAway:0, cornersHome:0, cornersAway:0, foulsHome:0, foulsAway:0, yellowHome:0, yellowAway:0, redHome:0, redAway:0, injHome:0, injAway:0, xgHome:0.0, xgAway:0.0 },
    events: [{ min:0, type:'start', txt:`Bola rolando para ${homeTeam.name} x ${awayTeam.name}. Velocidade: ${state.prefs?.matchSpeed||3}x.` }]
  };
  notify('Partida iniciada', 'Relógio automático ativado.', 'win');
  P('partida');
  startAutoClock();
}

/* BUG FIX #1: startSecondHalf implementado */
function startSecondHalf() {
  const live = state.liveMatch;
  if (!live) return;
  // Fechar modal de intervalo se aberto
  document.getElementById('halftime-modal')?.remove();
  live.phase  = 'second';
  live.half   = 2;
  live.minute = 45;
  live.added  = live.secondAdded;   // acréscimos do 2º tempo
  live.events.push({ min: 45, type: 'start', txt: 'Início do segundo tempo. A equipe volta ao campo.' });
  P('partida');
  startAutoClock();
}

/* BUG FIX #3: detectar intervalo dentro do loop de simulação */
function checkHalftime(live) {
  if (live.phase === 'first' && live.minute >= 45 + live.firstAdded && !live.halftimeShown) {
    live.phase          = 'halftime';
    live.halftimeShown  = true;
    live.added          = live.secondAdded; // preparar acréscimos do 2º
    live.minute         = 45 + live.firstAdded;
    live.events.push({ min: live.minute, type: 'end', txt: 'Fim do primeiro tempo. Intervalo obrigatório — faça seus ajustes.' });
    stopAutoClock();
    // BUG FIX #15: abrir modal fora do stack atual
    setTimeout(() => openHalftimeModal(), 120);
    return true;
  }
  return false;
}

function advanceMatchAuto() {
  const live = state.liveMatch;
  if (!live || live.finished || live.phase === 'halftime') return;
  const speed  = state.prefs?.matchSpeed || 3;
  const inc    = Math.max(2, Math.round(speed * 1.15));
  const limit  = live.phase === 'first'
    ? 45 + live.firstAdded
    : 90 + live.secondAdded;
  const target = Math.min(limit, live.minute + inc);

  while (live.minute < target) {
    live.minute += rand(1, 3);
    if (live.minute > target) live.minute = target;
    simulateLiveEvent(live);
    if (checkHalftime(live)) return;
    const last = live.events[live.events.length - 1];
    const pause = (state.prefs?.autoPauseInjury && last?.type === 'injury')
               || (state.prefs?.autoPauseCard   && ['yellow','red'].includes(last?.type));
    if (pause) { stopAutoClock(); notify('Partida pausada', last.type === 'injury' ? 'Lesão detectada.' : 'Cartão importante.', 'gold'); break; }
  }

  if (live.minute >= limit && live.phase === 'second') {
    live.minute  = limit;
    live.finished = true;
    stopAutoClock();
    live.events.push({ min: `90+${live.secondAdded}`, type: 'end', txt: 'Fim de jogo.' });
  }
  P('partida');
}

function simulateToEnd() {
  stopAutoClock();
  const live = state.liveMatch;
  if (!live) return;
  let safety = 0;
  while (!live.finished && live.phase !== 'halftime' && safety < 60) {
    advanceMatchAuto();
    safety++;
    if (state.liveMatch && (state.liveMatch.finished || state.liveMatch.phase === 'halftime')) break;
  }
}

function simulateLiveEvent(live) {
  const home    = club(live.homeTeam);
  const away    = club(live.awayTeam);
  const mineHome = home.id === state.clubId;
  const myBoost  = live.mentality === 'ofensiva' ? 4 : live.mentality === 'defensiva' ? -2 : 0;
  const defBoost = live.mentality === 'defensiva' ? 4 : 0;
  const redEffect = (live.stats.redHome - live.stats.redAway) * -5;
  const hPower = home.overall + (mineHome ? myBoost : defBoost * .2) + (home.morale - 60) / 10 + (mineHome ? teamLineupAvg() - myClub().overall : 0) + redEffect;
  const aPower = away.overall + (!mineHome ? myBoost : defBoost * .2) + (away.morale - 60) / 10 + (!mineHome ? teamLineupAvg() - myClub().overall : 0) - redEffect;
  const total   = Math.max(1, hPower + aPower);
  const hChance = hPower / total;

  live.stats.posHome = clamp(Math.round(live.stats.posHome * .75 + hChance * 100 * .25 + rand(-4, 4)), 34, 66);
  live.ballX = clamp(rand(20, 80) + (hChance - .5) * 25, 6, 88);
  live.ballY = rand(18, 78);

  const roll = Math.random();

  if (roll < .23) {
    const homeAtk = Math.random() < hChance;
    const team    = homeAtk ? home : away;
    homeAtk ? live.stats.shotsHome++ : live.stats.shotsAway++;
    const on = Math.random() < .45;
    if (on) homeAtk ? live.stats.onHome++ : live.stats.onAway++;
    homeAtk ? live.stats.xgHome += on ? .18 : .06 : live.stats.xgAway += on ? .18 : .06;
    const scorer = pickSquadPlayer(team.id, 'ATA') || pickSquadPlayer(team.id);
    if (on && Math.random() < .24) {
      homeAtk ? live.homeGoals++ : live.awayGoals++;
      if (scorer) { scorer.goals++; scorer.moral = clamp(scorer.moral + 6, 0, 100); scorer.trend++; }
      live.events.push({ min: live.minute, type: 'goal', txt: `GOL! <b>${scorer ? scorer.name : 'Jogador'}</b> marca para ${team.name}.` });
    } else {
      live.events.push({ min: live.minute, type: on ? 'save' : 'shot', txt: `${team.name} finaliza.${on ? ' O goleiro defende.' : ' A bola sai.'}` });
    }
  } else if (roll < .35) {
    const homeAtk = Math.random() < hChance;
    homeAtk ? live.stats.cornersHome++ : live.stats.cornersAway++;
    live.events.push({ min: live.minute, type: 'corner', txt: `Escanteio para ${homeAtk ? home.name : away.name}.` });
  } else if (roll < .52) {
    const homeFoul = Math.random() < .5;
    homeFoul ? live.stats.foulsHome++ : live.stats.foulsAway++;
    const yellow = Math.random() < .24;
    const red    = yellow && Math.random() < .07;
    if (yellow) homeFoul ? live.stats.yellowHome++ : live.stats.yellowAway++;
    const cardPlayer = pickSquadPlayer((homeFoul ? home : away).id);
    if (red) {
      homeFoul ? live.stats.redHome++ : live.stats.redAway++;
      if (cardPlayer) { live.redPlayers.push(String(cardPlayer.id)); live.unavailable.push(String(cardPlayer.id)); }
    }
    live.events.push({ min: live.minute, type: red ? 'red' : yellow ? 'yellow' : 'foul',
      txt: `Falta${yellow?' e cartão amarelo':''}${red?' com expulsão':''}${cardPlayer?' para <b>'+cardPlayer.name+'</b>':''} do ${homeFoul ? home.name : away.name}.` });
  } else if (roll < .545 && !live.injuryHappened && Math.random() < .22) {
    const homeInj = Math.random() < .5;
    const team    = homeInj ? home : away;
    const p       = pickSquadPlayer(team.id);
    if (p) { registerInjury(p, team.name); live.unavailable.push(String(p.id)); live.injuryHappened = true; }
    homeInj ? live.stats.injHome++ : live.stats.injAway++;
    live.events.push({ min: live.minute, type: 'injury', txt: `Atendimento médico: <b>${p ? p.name : 'atleta'}</b> sente lesão.` });
  } else if (roll < .70) {
    const p = pick(myPlayers());
    p.fit = clamp(p.fit - rand(4, 10), 20, 100);
    live.events.push({ min: live.minute, type: 'tactic', txt: `${p.name} demonstra desgaste. Auxiliar sugere substituição.` });
  } else {
    const comments = ['jogo truncado no meio-campo','adversário acelera pelos lados','sua equipe procura espaço','torcida reage a cada dividida','auxiliar pede compactação entre as linhas'];
    live.events.push({ min: live.minute, type: 'info', txt: `Comentário: ${pick(comments)}.` });
  }
}

function pickSquadPlayer(clubId, pos) {
  const list = players.filter(p =>
    p.club === clubId &&
    (!pos || p.pos === pos) &&
    (!state?.liveMatch?.unavailable || !state.liveMatch.unavailable.includes(String(p.id)))
  );
  return list.length ? pick(list) : null;
}

function changeMentality(m) {
  const live = state.liveMatch;
  if (!live || live.finished) return;
  live.mentality = m;
  live.events.push({ min: live.minute, type: 'tactic', txt: `Postura alterada para <b>${m}</b>.` });
  notify('Comando aplicado', `Postura: ${m}.`, 'gold');
  P('partida');
}

function openSubstitutionModal(isHalftime = false) {
  const live = state.liveMatch;
  if (!live || live.finished) return;
  if (!isHalftime) stopAutoClock();

}

function renderSubstitutionModal(isHalftime = false) {
  const live   = state.liveMatch;
  const lineup = myPlayers().filter(p => state.lineup.includes(p.id)).sort((a, b) => posOrd(a.pos) - posOrd(b.pos) || b.ovr - a.ovr);
  const bench  = myPlayers().filter(p => !state.lineup.includes(p.id) && isAvailable(p)).sort((a, b) => b.ovr - a.ovr);
  const html = `
    <div class="subOverlay" id="sub-modal">
      <div class="subBox">
        <div class="negHeader">
          <div><div class="negTitle">Substituição</div><div class="small muted">Escolha quem sai e quem entra.</div></div>

        </div>

          <div><div class="card-title mb8">Sai</div>${lineup.map(p => pickPlayerRow(p, 'out')).join('')}</div>

        </div>
        <div class="negGrid3 mt12">
          <button class="btn bac" onclick="confirmChosenSub(${isHalftime})">Confirmar</button>

        </div>
      </div>
    </div>`;
  document.body.insertAdjacentHTML('beforeend', html);
}

function pickPlayerRow(p, side) {
  const sel = String(subChoice[side]) === String(p.id);
  return `
    <div class="pickRow ${sel ? 'selected' : ''}" onclick="subChoice.${side}='${p.id}';rerenderSubModal()">
      <span class="pb pos-${p.pos}">${p.pos}</span>
      <div style="flex:1"><b>${p.name}</b><div class="small muted">OVR ${p.ovr} • Forma ${p.fit}% • Moral ${Math.round(p.moral)}</div></div>
      <span class="ovr ${ovClass(p.ovr)}">${p.ovr}</span>
    </div>`;
}

function rerenderSubModal() {
  const el = document.getElementById('sub-modal');
  // Preserve isHalftime context via data attribute
  const isHalftime = el?.dataset?.halftime === 'true';
  el?.remove();
  renderSubstitutionModal(isHalftime);
}

/* BUG FIX #15: closeSubModal só reinicia clock se não for intervalo */
function closeSubModal(isHalftime = false) {
  document.getElementById('sub-modal')?.remove();
  if (!isHalftime && state?.liveMatch && !state.liveMatch.finished && state.liveMatch.phase !== 'halftime') {
    startAutoClock();
  }
}

function assistantSuggestSub() {
  const lineup = myPlayers().filter(p => state.lineup.includes(p.id)).sort((a, b) => a.fit - b.fit);
  const bench  = myPlayers().filter(p => !state.lineup.includes(p.id) && isAvailable(p)).sort((a, b) => b.ovr - a.ovr);
  const out    = lineup[0];
  const inn    = bench.find(p => p.pos === out?.pos) || bench[0];
  subChoice = { out: out?.id, in: inn?.id };
  rerenderSubModal();
}

function confirmChosenSub(isHalftime = false) {
  const live = state.liveMatch;
  if (!subChoice.out || !subChoice.in) { notify('Escolha incompleta', 'Selecione quem sai e quem entra.', 'loss'); return; }
  const out = myPlayers().find(p => String(p.id) === String(subChoice.out));
  const inn = myPlayers().find(p => String(p.id) === String(subChoice.in));
  state.lineup = state.lineup.filter(id => String(id) !== String(out.id));
  state.lineup.push(inn.id);
  live.unavailable.push(String(out.id));
  live.injuredOnPitch = (live.injuredOnPitch || []).filter(x => String(x) !== String(out.id));
  live.subs++;
  live.events.push({ min: live.minute, type: 'sub', txt: `Substituição: sai <b>${out.name}</b>, entra <b>${inn.name}</b>.` });
  document.getElementById('sub-modal')?.remove();
  notify('Substituição feita', `${inn.name} entrou.`, 'win');
  P('partida');
  /* BUG FIX #15: só retomar clock se não for intervalo */
  if (!isHalftime && live.phase !== 'halftime') startAutoClock();
}

/* =========================================================
   HALFTIME MODAL
   ========================================================= */
function halftimeAdvice(live) {
  const s      = live.stats;
  const myHome = live.homeTeam === state.clubId;
  const myG    = myHome ? live.homeGoals : live.awayGoals;
  const opG    = myHome ? live.awayGoals : live.homeGoals;
  const myShots = myHome ? s.shotsHome : s.shotsAway;
  const opShots = myHome ? s.shotsAway : s.shotsHome;
  const tired   = myPlayers().filter(p => state.lineup.includes(p.id)).sort((a, b) => a.fit - b.fit)[0];
  if (myG < opG)      return `Estamos atrás. Sugestão: aumentar agressividade.${tired ? ` ${tired.name} está desgastado.` : ''}`;
  if (myShots < opShots) return `O adversário finalizou mais. Sugestão: proteger a área.`;
  return `Primeiro tempo competitivo. ${tired ? `${tired.name} pode sair no 2º tempo.` : 'Manter estrutura.'}`;
}

function openHalftimeModal() {
  const live = state.liveMatch;
  if (!live) return;
  const home = club(live.homeTeam);
  const away = club(live.awayTeam);
  const html = `
    <div class="halftimeOverlay" id="halftime-modal">
      <div class="halftimeBox">
        <div class="htHero">
          <div class="card-title">⏸ Intervalo obrigatório</div>
          <div class="htScore">${home.name} ${live.homeGoals} x ${live.awayGoals} ${away.name}</div>
          <div class="small muted">Fim do 1º tempo: 45+${live.firstAdded}. Faça ajustes.</div>
        </div>
        <div class="mini-card">
          <b>Auxiliar técnico:</b>
          <div class="small muted mt8">${halftimeAdvice(live)}</div>
        </div>
        <div class="g3 mt12">
          <button class="btn bgh" onclick="changeMentality('ofensiva')">Voltar pressionando</button>
          <button class="btn bgh" onclick="changeMentality('defensiva')">Voltar fechado</button>
          <button class="btn bgh" onclick="openSubstitutionModal(true)">Fazer substituição</button>
        </div>
        ${renderMatchStats(live)}
        <div class="negGrid3 mt12">
          <button class="btn bac" onclick="startSecondHalf()">Iniciar segundo tempo</button>
          <button class="btn bgh" onclick="document.getElementById('halftime-modal')?.remove()">Ver partida</button>

/* =========================================================
   MATCH STATS / EVENT RENDERING
   ========================================================= */
function renderMatchStats(live) {
  const s    = live.stats;
  const home = club(live.homeTeam);
  const away = club(live.awayTeam);
  const rows = [
    ['Posse',       s.posHome+'%',             (100-s.posHome)+'%',          s.posHome,              100-s.posHome],
    ['Finalizações',s.shotsHome,               s.shotsAway,                  s.shotsHome,            Math.max(1,s.shotsAway)],
    ['No alvo',     s.onHome,                  s.onAway,                     s.onHome,               Math.max(1,s.onAway)],
    ['Escanteios',  s.cornersHome,             s.cornersAway,                s.cornersHome,          Math.max(1,s.cornersAway)],
    ['Faltas',      s.foulsHome,               s.foulsAway,                  s.foulsHome,            Math.max(1,s.foulsAway)],
    ['Cartões',     `${s.yellowHome}/${s.redHome}`, `${s.yellowAway}/${s.redAway}`, s.yellowHome+s.redHome*2, Math.max(1,s.yellowAway+s.redAway*2)],
    ['Lesões',      s.injHome,                 s.injAway,                    s.injHome,              Math.max(1,s.injAway)],
    ['xG',          s.xgHome.toFixed(2),       s.xgAway.toFixed(2),          s.xgHome,               Math.max(.1,s.xgAway)]
  ];
  return `
    <div class="card mt12">
      <div class="card-hd">
        <div><div class="card-title">📊 Estatísticas ${live.finished?'Finais':'da Partida'}</div><div class="card-sub">${home.name} x ${away.name}</div></div>
      </div>
      ${rows.map(r => {
        const tot = Number(r[3]) + Number(r[4]);
        const l   = tot ? Math.round(Number(r[3]) / tot * 100) : 50;
        return `
          <div class="statRow">
            <div><div class="small bold">${r[1]}</div><div class="bar"><div style="width:${l}%"></div></div></div>
            <div class="statName">${r[0]}</div>
            <div><div class="small bold" style="text-align:right">${r[2]}</div><div class="bar right"><div style="width:${100-l}%"></div></div></div>
          </div>`;
      }).join('')}
    </div>`;
}

function renderEvent(e) {
  const icon = { goal:'⚽', save:'🧤', shot:'🥅', corner:'🚩', yellow:'🟨', red:'🟥', foul:'✋', injury:'🚑', sub:'🔁', tactic:'📋', start:'▶', end:'🏁', info:'•' }[e.type] || '•';
  return `<div class="eventItem"><div class="eventMin">${e.min}'</div><div class="eventText">${icon} ${e.txt}</div></div>`;
}

function renderBenchPanel(live) {
  const tired = myPlayers().filter(p => state.lineup.includes(p.id)).sort((a, b) => a.fit - b.fit).slice(0, 4);
  return `
    <div class="mini-card">
      <b>Postura atual:</b> <span class="acc">${live.mentality}</span>
      <div class="small muted mt8">Substituições: ${live.subs}/5</div>
    </div>
    <div class="dv"></div>
    <b>Alertas do auxiliar</b>
    ${tired.map(p => `

/* =========================================================
   CONFIRM RESULT
   ========================================================= */
function confirmMatchResult() {
  stopAutoClock();
  const live = state.liveMatch;
  if (!live || !live.finished || live.confirmed) return;
  live.confirmed = true;

  const home = club(live.homeTeam);
  const away = club(live.awayTeam);
  const c    = myClub();

  markFixtureDone(live);
  if (!live.n || live.n.type === 'league') applyTable(home, away, live.homeGoals, live.awayGoals);
  applySuspensionsFromMatch(live);

  const myGoals  = home.id === c.id ? live.homeGoals : live.awayGoals;
  const oppGoals = home.id === c.id ? live.awayGoals : live.homeGoals;
  const win  = myGoals > oppGoals;
  const draw = myGoals === oppGoals;

  const emotional = (live.log?.emotional || 0) + (win ? 8 : draw ? 2 : -8) - Math.round((live.log?.fatigue || 0) / 5);
  c.morale = clamp(c.morale + emotional, 0, 100);
  updatePlayerStats(win, draw, live.log, myGoals);

  lastMatch = { a: home, b: away, ga: live.homeGoals, gb: live.awayGoals, home: home.id === c.id, result: win ? 'vitória' : draw ? 'empate' : 'derrota', log: live.log, stats: live.stats, events: live.events };
  if (state.h2h) state.h2h.push({ home: home.name, away: away.name, score: `${live.homeGoals} x ${live.awayGoals}`, comp: (live.n?.label || labelDiv(c.div)), season: state.season, round: state.round, result: lastMatch.result });
  lastReport = makeReport(myGoals, oppGoals, win, draw, live.log);

  addFeed(`<span class="${win?'w':draw?'g':'l'}">${home.name} ${live.homeGoals} x ${live.awayGoals} ${away.name}</span> — ${lastMatch.result}.`);
  addNews('Rodada', `${home.name} ${live.homeGoals} x ${live.awayGoals} ${away.name}`, `Resultado confirmado. ${lastReport.summary}`, 'rodada');

  // Simulate parallel games
  const results = [];
  applyCompetitionBonus(live.n?.comp || c.div, win);
  if (!live.n || live.n.type === 'league') {
    const others = clubs.filter(x => x.div === c.div && x.id !== c.id && x.id !== away.id && x.id !== home.id).slice(0, 18);
    for (let i = 0; i < others.length - 1; i += 2) {
      if (others[i] && others[i+1]) {
        const prevGpA = others[i].gp, prevGpB = others[i+1].gp;
        simulateMatch(others[i], others[i+1], Math.random() > .5, false, null);
        results.push({ home: others[i].name, away: others[i+1].name, score: `${others[i].gp-prevGpA} x ${others[i+1].gp-prevGpB}` });
      }
    }
  } else {
    simulateOtherInternational(live.n.comp, results);
  }
  state.liveResults = results;

  state.round++;
  decayAbsences();
  state.liveMatch = null;
  developPlayers(true);
  buildMarket();
  maybeSponsorNews();
  updateHeader();
  notify('Resultado confirmado', 'Tabela e elenco atualizados.', 'win');
  P('partida');
}

function simulateMatch(a, b, aHome, isMine, log) {
  if (!a.form) a.form = [];
  if (!b.form) b.form = [];
  const fa = a.overall + (aHome ? 3 : 0) + (isMine ? teamLineupAvg() - a.overall : 0) + (a.morale - 60) / 8;
  const fb = b.overall + (!aHome ? 3 : 0) + (b.morale - 60) / 10;
  let ga = Math.max(0, Math.round(Math.random() * 2.5 + (fa - fb) / 18));
  let gb = Math.max(0, Math.round(Math.random() * 2.5 + (fb - fa) / 18));
  if (Math.random() < .12) ga++;
  if (Math.random() < .12) gb++;
  applyTable(a, b, ga, gb);
  if (isMine) {
    const win = ga > gb, draw = ga === gb;
    const emotional = (log?.emotional || 0) + (win ? 8 : draw ? 2 : -8) - Math.round((log?.fatigue || 0) / 5);
    a.morale = clamp(a.morale + emotional, 0, 100);
    lastMatch  = { a, b, ga, gb, home: aHome, result: win ? 'vitória' : draw ? 'empate' : 'derrota', log };
    lastReport = makeReport(ga, gb, win, draw, log);
    updatePlayerStats(win, draw, log, ga);
    addFeed(`<span class="${win?'w':draw?'g':'l'}">${a.name} ${ga} x ${gb} ${b.name}</span> — ${lastMatch.result}.`);
    addNews('Rodada', `${a.name} ${ga} x ${gb} ${b.name}`, `${lastReport.summary}`, 'rodada');
    notify('Partida', `${a.name} ${ga} x ${gb} ${b.name}`, win ? 'win' : draw ? 'gold' : 'loss');
  }
}

function updatePlayerStats(win, draw, log, goals) {
  const lineup = myPlayers().filter(p => state.lineup.includes(p.id));
  // BUG FIX: goals pode ser 0 — evitar undefined com Math.min
  const scorerCount = Math.min(goals || 0, lineup.length);
  const scorers = [...lineup].sort(() => Math.random() - .5).slice(0, scorerCount);
  lineup.forEach(p => {
    p.games++;
    p.minutes += rand(65, 95);
    p.fit = clamp(p.fit - (log?.fatigue || 5) + rand(-4, 3), 30, 100);
    const note = 6 + rand(-12, 14) / 10 + (win ? .6 : draw ? 0 : -.5) + ((p.moral - 60) / 50);
    p.avg   = +(p.avg * .75 + note * .25).toFixed(2);
    p.moral = clamp(p.moral + (win ? rand(2, 7) : draw ? rand(-1, 3) : rand(-7, 0)) + (log?.emotional || 0) / 4, 0, 100);
    p.trend = clamp(p.trend + (note > 7 ? 1 : note < 5.8 ? -1 : 0), -5, 5);
    evolvePlayerAfterMatch(p, true, note > 7.2);
  });
  scorers.forEach(p => { p.goals++; p.trend++; p.moral = clamp(p.moral + 5, 0, 100); evolvePlayerAfterMatch(p, true, true); });
  recalcValues();
}

function makeReport(ga, gb, win, draw, log) {
  const tired = myPlayers().filter(p => p.fit < 55).length;
  const hot   = myPlayers().filter(p => p.trend > 2).sort((a, b) => b.avg - a.avg)[0];
  const bad   = myPlayers().filter(p => p.trend < -2).sort((a, b) => a.avg - b.avg)[0];
  const points = [];
  if (ga === 0)    points.push('baixa criação ofensiva');
  if (gb >= 2)     points.push('fragilidade defensiva');
  if (tired >= 3)  points.push('desgaste físico relevante');
  if (log?.emotional < 0) points.push('viagem pesou emocionalmente');
  if (!points.length) points.push('equipe competitiva e equilibrada');
  return {
    summary: `Auxiliar aponta ${points.join(', ')}. ${hot ? hot.name + ' está em alta. ' : ''}${bad ? bad.name + ' merece atenção. ' : ''}`,
    points, hot, bad
  };
}

/* =========================================================
   AUTO CLOCK
   ========================================================= */
function startAutoClock() {
  const live = state?.liveMatch;
  if (!live || live.finished || live.phase === 'halftime') return;
  stopAutoClock();
  live.auto   = true;
  const speed = state.prefs?.matchSpeed || 3;
  const delay = Math.max(350, 1500 - speed * 120);
  matchTimer  = setInterval(() => {
    const lm = state.liveMatch;
    if (!lm || lm.finished) {
      stopAutoClock();
      if (lm && lm.finished && !lm.postShown) { lm.postShown = true; openPostMatchModal(); }
      return;
    }
    if (lm.phase === 'halftime') { stopAutoClock(); return; }
    advanceMatchAuto();
  }, delay);
}

function stopAutoClock() {
  if (matchTimer) { clearInterval(matchTimer); matchTimer = null; }
  if (state?.liveMatch) state.liveMatch.auto = false;
}

function toggleAutoClock() {
  if (matchTimer) stopAutoClock(); else startAutoClock();
  P('partida');
}

   ========================================================= */
function initSeasonCalendar() {
  const c        = myClub();
  const divClubs = clubs.filter(x => x.div === c.div && x.id !== c.id);
  const days     = ['Sábado','Domingo','Quarta-feira'];
  const times    = ['16:00','18:30','20:00','21:00'];
  const calendar = [];
  let round = 1;

  divClubs.forEach(opp => {
    calendar.push({ id:`${round}-${c.id}-${opp.id}`, round, opp:opp.id, home:true,  comp:c.div, label:labelDiv(c.div), type:'league', day:pick(days), time:pick(times), status:'open', dist:distance(c.estado, opp.estado), playable:true });
    round++;
    calendar.push({ id:`${round}-${opp.id}-${c.id}`, round, opp:opp.id, home:false, comp:c.div, label:labelDiv(c.div), type:'league', day:pick(days), time:pick(times), status:'open', dist:distance(c.estado, opp.estado), playable:true });
    round++;
  });

  const hasLib = c.div === 'A';
  const hasSul = c.div === 'A' || c.div === 'B';

  if (hasLib) {
    clubs.filter(x => x.div === 'A' && x.id !== c.id).slice(0, 5).forEach(opp => {
      calendar.push({ id:`LIB-${round}-${opp.id}`, round, opp:opp.id, home:round%2===0, comp:'LIB', label:'Libertadores', type:'international', day:pick(['Terça-feira','Quarta-feira']), time:'21:30', status:'open', dist:distance(c.estado, opp.estado), playable:true });
      round++;
    });
  }

  if (hasSul) {
    clubs.filter(x => x.div === 'A' && x.id !== c.id).slice(5, 9).forEach(opp => {
      calendar.push({ id:`SUL-${round}-${opp.id}`, round, opp:opp.id, home:round%2===0, comp:'SUL', label:'Sul-Americana', type:'international', day:pick(['Terça-feira','Quinta-feira']), time:'21:30', status:'open', dist:distance(c.estado, opp.estado), playable:true });
      round++;
    });
  }

  state.calendar = calendar;
  state.intl = {
    libertadores: hasLib ? [c.id, ...clubs.filter(x => x.div==='A').slice(0,5).map(x=>x.id)] : [],
    sulamericana: hasSul ? [c.id, ...clubs.filter(x => x.div==='A').slice(0,7).map(x=>x.id)] : [],
    recopa: [], mundial: []
  };
}

function calcInitialCash(val, type) {

function autoAdjustOffer() {
  const p = players.find(x => x.id === neg.pid);
  neg.offer.cash = calcInitialCash(p.value, neg.offer.type);
  neg.offer.future = neg.offer.type === 'percentual_futuro' ? 20 : 0;
  neg.offer.installments = neg.offer.type === 'parcelado' ? 12 : 0;
  neg.offer.debt = neg.offer.type === 'quitacao_divida' ? Math.round(p.value * .6) : 0;
}

/* BUG FIX #8: negotiationScore — protege divisão por zero */
function negotiationScore() {
  const p   = players.find(x => x.id === neg.pid);
  const seller = club(p.club);
  const c   = myClub();
  const o   = neg.offer;
  const out = players.find(x => String(x.id) === String(o.playerOut));
  let packageValue = (+o.cash || 0) + (+o.debt || 0) + (out ? out.value * .78 : 0) + (+o.future || 0) * p.value / 180;
  if (o.type === 'emprestimo_sem_custo') packageValue = p.value * .10;
  if (o.type === 'emprestimo_pago')     packageValue = (+o.cash || 0) * 2.2;
  if (o.type === 'opcao_compra')        packageValue = (+o.cash || 0) * 2 + p.value * .35;
  if (o.type === 'parcelado')           packageValue = (+o.cash || 0) * 1.25 + (o.installments ? p.value * .20 : 0);
  const base = Math.max(1, p.value); // BUG FIX #8
  const need = base * (seller?.cash < 5000000 ? .88 : 1.02);
  const score = 50 + (packageValue - need) / base * 70 + (c.rep - (seller?.rep||50)) * .8 + (neg.round > 1 ? 5 : 0) - (c.cash < (+o.cash||0) ? 45 : 0) + (o.type.includes('emprestimo') ? 10 : 0);
  return clamp(Math.round(score), 0, 100);
}

function negotiationRead() {
  const sc = negotiationScore();
  if (sc >= 78) return 'Proposta muito forte. O clube tende a aceitar.';
  if (sc >= 55) return 'Proposta negociável. Pode vir contraproposta.';
  if (sc >= 35) return 'Proposta fraca. Melhore o valor ou inclua atleta/percentual.';
  return 'Proposta muito baixa ou caixa insuficiente.';
}

function sendNegotiationOffer() {
  const p = players.find(x => x.id === neg.pid);
  const seller = club(p.club);
  const c = myClub(), sc = negotiationScore(), o = neg.offer;
  neg.chat.push(['me', `${c.name}: proposta por ${p.name} — ${dealName(o.type)}, ${BRL(+o.cash||0)}${o.future?`, ${o.future}% futuro`:''}${o.playerOut?', atleta na troca':''}${o.debt?`, abatendo ${BRL(o.debt)}`:''}.`]);
  if (c.cash < (+o.cash || 0)) { neg.chat.push(['club', `${seller?.name||'Clube'}: vocês não têm caixa para essa proposta.`]); renderNeg(); return; }
  if (sc >= 74 || (sc >= 62 && Math.random() < .55)) { acceptNegotiation(); return; }
  neg.round++;
  if (sc >= 42) {
    const ask = Math.round((p.value * (seller?.cash < 5000000 ? .9 : 1.05)) - (+o.cash || 0));
    neg.chat.push(['club', `${seller?.name||'Clube'}: precisamos de melhoria de ${BRL(Math.max(100000, ask*.35))} ou inclusão de jogador/percentual.`]);
  } else {
    neg.chat.push(['club', `${seller?.name||'Clube'}: proposta distante da nossa avaliação.`]);
  }
  renderNeg();
}

function improveOffer() {
  const p = players.find(x => x.id === neg.pid);
  neg.offer.cash = Math.round((+neg.offer.cash || 0) + p.value * .12);
  if (neg.offer.future < 20) neg.offer.future += 5;
  neg.chat.push(['me', 'Melhoramos a composição da proposta.']);
  renderNeg();
}

function acceptNegotiation() {
  const p = players.find(x => x.id === neg.pid);
  const c = myClub(), seller = club(p.club), o = neg.offer;
  const out = players.find(x => String(x.id) === String(o.playerOut));
  c.cash -= (+o.cash || 0);
  if (+o.cash) state.finance.push(['Contratação ' + p.name, -(+o.cash)]);
  if (out) { out.club = seller?.id; out.history.push({ season: state.season, move:'Usado em troca', club: seller?.name||'?' }); }
  p.club  = c.id;
  p.moral = 68;
  p.history.push({ season: state.season, move: dealName(o.type), club: c.name });
  addFeed(`<span class="w">${p.name}</span> contratado via ${dealName(o.type)}.`);
  addNews('Mercado', `${c.name} fecha com ${p.name}`, `Negociação concluída no modelo ${dealName(o.type)}.`, 'mercado');
  notify('Negociação aceita', `${p.name} agora é do seu clube.`, 'win');
  closeNegotiation();
  buildMarket();
  updateHeader();
  P('mercado');
}

      <div class="card-hd"><div><div class="card-title">${meta.icon} ${meta.name}</div><div class="card-sub">${meta.prize}</div></div></div>
      <div class="compPurpose">${meta.purpose}</div>
      <div class="zoneLegend">
        <span class="plib">Zona de título/acesso/vaga</span>
        <span class="psul">Vaga continental</span>
        <span class="prel">Risco/queda</span>
      </div>
    </div>`;
  if (['A','B','C','D','R'].includes(id)) {
    html += `
      <div class="card">
        <div class="card-hd"><div class="card-title">Resultados da última rodada</div></div>
        <div class="liveResults">
          ${live.length
            ? live.map(g => `<div class="liveGame"><div class="small muted">Rodada ${Math.max(1, state.round-1)}</div><div class="liveScore">${g.home} ${g.score} ${g.away}</div></div>`).join('')
            : '<div class="mini-card">Os resultados aparecem aqui após a rodada.</div>'}
        </div>
      </div>
      <div id="table-holder"></div>`;
    document.getElementById('competition-body').innerHTML = html;
    standingsInto(id);
  } else {
    document.getElementById('competition-body').innerHTML = html + internationalCompetition(id);
  }
}

function internationalCompetition(id) {
  const myEligible = id === 'LIB' ? state.intl.libertadores?.includes(myClub().id)
                   : id === 'SUL' ? state.intl.sulamericana?.includes(myClub().id)
                   : false;
  const rows = clubs.filter(c => c.div === 'A').slice(0, 12);
  return `
    <div class="card">
      <div class="card-hd"><div><div class="card-title">🌍 Participantes simulados</div></div></div>
      <table class="tbl">
        <thead><tr><th>#</th><th>Clube</th><th>País</th><th>Força</th><th>Status</th></tr></thead>
        <tbody>${rows.map((c, i) => `
          <tr class="${c.id===myClub().id?'meu':''}">
            <td>${i+1}</td>
            <td><div class="cc"><span class="badge">${c.badge}</span><span class="cn">${c.name}</span></div></td>
            <td>Brasil</td><td>${c.overall}</td>
            <td>${i<4?'Grupo forte':'Classificável'}</td>
          </tr>`).join('')}
        </tbody>
      </table>
      <div class="mini-card mt12">${myEligible ? 'Seu clube está no radar desta competição.' : 'Seu clube ainda precisa de campanha nacional para entrar.'}</div>
    </div>`;
}

function simulateOtherInternational(comp, results) {
  const pool = clubs.filter(x => x.div === 'A').slice(0, 8);
  for (let i = 0; i < pool.length - 1; i += 2) {
    if (pool[i] && pool[i+1]) {
      results.push({ home: pool[i].name, away: pool[i+1].name, score: `${rand(0,3)} x ${rand(0,3)}` });
    }
  }
}

function applyCompetitionBonus(comp, win) {
  if (!win) return;
  const c     = myClub();
  const bonus = comp === 'LIB' ? 800000 : comp === 'SUL' ? 500000 : comp === 'MUN' ? 2000000 : comp === 'REC' ? 400000 : comp === 'A' ? 250000 : comp === 'B' ? 120000 : 60000;
  c.cash += bonus;
  state.finance.push(['Premiação ' + (comp==='LIB'?'Libertadores':comp==='SUL'?'Sul-Americana':labelDiv(comp)), bonus]);
}

function salaTrofeus() {
  const ts = state.trophies || [];
  document.getElementById('content').innerHTML = `
    <div class="card">
      <div class="card-hd"><div><div class="card-title">🏛 Sala de Troféus</div><div class="card-sub">Histórico de conquistas da sua carreira.</div></div></div>
      ${ts.length
        ? `<div class="trophyShelf">${ts.map(t => `<div class="trophy"><div class="trophyIcon">${t.icon||'🏆'}</div><div class="trophyName">${t.name}</div><div class="small muted">${t.season} • ${t.note||'Conquista oficial'}</div></div>`).join('')}</div>`
        : '<div class="mini-card">Nenhum troféu conquistado ainda.</div>'}
    </div>`;
}

function historicoConfrontos() {
  const h = state.h2h || [];
  document.getElementById('content').innerHTML = `
    <div class="card">
      <div class="card-hd"><div><div class="card-title">📚 Histórico de Confrontos</div><div class="card-sub">Registro dos jogos da sua carreira.</div></div></div>
      ${h.length
        ? h.slice().reverse().map(g => `<div class="h2hBox"><div class="h2hScore">${g.home} ${g.score} ${g.away}</div><div class="small muted">${g.comp} • Temporada ${g.season} • Rodada ${g.round}</div><div class="small muted">${g.result}</div></div>`).join('')
        : '<div class="mini-card">Nenhum confronto registrado ainda.</div>'}
    </div>`;
}

/* =========================================================
   STADIUM
   ========================================================= */
function estadio() {
  const c = myClub();
  if (!c.facilities) c.facilities = { gramado:60, iluminacao:55, camarotes:25, seguranca:50, acesso:45 };
  const ticket   = c.div==='A'?70:c.div==='B'?45:c.div==='C'?28:c.div==='D'?18:12;
  const avgAtt   = Math.round(c.stadium * (.28 + c.morale/220 + (c.j ? Math.min(c.pts/(c.j*3),1)*.25 : .08)));
  const income   = avgAtt * ticket;
  document.getElementById('content').innerHTML = `
    <div class="g2">
      <div class="card">
        <div class="card-hd"><div><div class="card-title">🏟 Gestão de Estádio</div><div class="card-sub">Receita, capacidade e estrutura.</div></div></div>
        <div class="stadiumView"></div>
        <div class="g3 mt12">
          <div class="sbox"><div class="n">${c.stadium.toLocaleString('pt-BR')}</div><div class="l">Capacidade</div></div>
          <div class="sbox"><div class="n">${avgAtt.toLocaleString('pt-BR')}</div><div class="l">Público médio</div></div>
          <div class="sbox"><div class="n">${BRL(income)}</div><div class="l">Receita/jogo</div></div>
        </div>
      </div>
      <div class="card">
        <div class="card-hd"><div class="card-title">🧱 Melhorias</div></div>
        ${stadiumUpgrade('Ampliar capacidade','capacidade', Math.round(c.stadium*.18)*100, `+${Math.round(c.stadium*.12).toLocaleString('pt-BR')} lugares`)}
        ${stadiumUpgrade('Gramado profissional','gramado', 650000, 'Reduz lesões e melhora jogo técnico')}
        ${stadiumUpgrade('Iluminação e transmissão','iluminacao', 900000, 'Libera jogos noturnos e melhora imagem')}
        ${stadiumUpgrade('Camarotes e hospitalidade','camarotes', 1200000, 'Aumenta receita premium')}
        ${stadiumUpgrade('Segurança e catracas','seguranca', 500000, 'Reduz multas e melhora operação')}
        ${stadiumUpgrade('Acesso e estacionamento','acesso', 700000, 'Aumenta público médio')}
      </div>
    </div>`;
}

function stadiumUpgrade(label, key, cost, desc) {
  return `
    <div class="mkc">
      <div style="flex:1"><b>${label}</b><div class="small muted">${desc} • custo ${BRL(cost)}</div></div>
      <button class="btn bac" onclick="buyStadiumUpgrade('${key}',${cost})">Investir</button>
    </div>`;
}

function buyStadiumUpgrade(key, cost) {
  const c = myClub();
  if (c.cash < cost) { notify('Caixa insuficiente', 'Não há recursos para essa melhoria.', 'loss'); return; }
  c.cash -= cost;
  state.finance.push(['Estádio: ' + key, -cost]);
  if (key === 'capacidade') c.stadium = Math.round(c.stadium * 1.12);
  else c.facilities[key] = clamp((c.facilities[key] || 30) + rand(10, 18), 0, 100);
  c.morale = clamp(c.morale + 2, 0, 100);
  addNews('Diretoria', `${c.name} anuncia investimento no estádio`, `A diretoria confirmou melhoria em ${key}.`, 'diretoria');
  notify('Estádio atualizado', 'Melhoria realizada com sucesso.', 'win');
  updateHeader();
  P('estadio');
}

/* =========================================================
   PREFERENCES
   ========================================================= */
function preferencias() {
  document.getElementById('content').innerHTML = `
    <div class="card">
      <div class="card-hd"><div><div class="card-title">⚙️ Preferências</div><div class="card-sub">Velocidade e pausas automáticas da partida.</div></div></div>
      ${prefContent()}
    </div>`;
}

function prefContent() {
  if (!state.prefs) state.prefs = { matchSpeed:3, autoPauseInjury:true, autoPauseCard:false };
  return `
    <div class="g3">
      <div class="mini-card">
        <b>Velocidade da partida</b>
        <select class="negInput mt8" onchange="state.prefs.matchSpeed=+this.value;if(matchTimer)startAutoClock();P('preferencias')">
          ${[1,2,3,4,5,6,8,10].map(x => `<option value="${x}" ${state.prefs.matchSpeed===x?'selected':''}>${x}x</option>`).join('')}
        </select>
        <div class="small muted mt8">Controla quantos minutos avançam por tick.</div>
      </div>
      <div class="mini-card">
        <b>Pausar em lesão</b>
        <div class="mt8">
          <button class="btn ${state.prefs.autoPauseInjury?'bgr':'bgh'}" onclick="state.prefs.autoPauseInjury=!state.prefs.autoPauseInjury;P('preferencias')">
            ${state.prefs.autoPauseInjury ? 'Ativado' : 'Desativado'}
          </button>
        </div>
      </div>
      <div class="mini-card">
        <b>Pausar em cartões</b>
        <div class="mt8">
          <button class="btn ${state.prefs.autoPauseCard?'bgr':'bgh'}" onclick="state.prefs.autoPauseCard=!state.prefs.autoPauseCard;P('preferencias')">
            ${state.prefs.autoPauseCard ? 'Ativado' : 'Desativado'}
          </button>
        </div>
      </div>
    </div>`;
}

function openPreferences() {
  const html = `
    <div class="prefOverlay" id="pref-modal">
      <div class="prefBox">
        <div class="negHeader">
          <div><div class="negTitle">Preferências da Partida</div><div class="small muted">Ajuste velocidade sem sair do jogo.</div></div>
          <button class="btn brd" onclick="document.getElementById('pref-modal').remove()">Fechar</button>
        </div>
        ${prefContent()}
      </div>
    </div>`;
  document.body.insertAdjacentHTML('beforeend', html);
}

/* =========================================================
   ECONOMY HELPERS
   ========================================================= */
function divMultiplier(c) {
  return c.div==='A' ? 2.2 : c.div==='B' ? 1.4 : c.div==='C' ? .85 : c.div==='D' ? .55 : .3;
}

function internationalMultiplier(c) {
  if (!state?.intl) return 1.0;
  if (state.intl.mundial?.includes(c.id))      return 1.5;
  if (state.intl.libertadores?.includes(c.id)) return 1.25;
  if (state.intl.sulamericana?.includes(c.id)) return 1.1;
  return 1.0;
}

function clubMarketValue(c) {
  const squadVal = players.filter(p => p.club === c.id).reduce((a, p) => a + p.value, 0);
  return Math.round(squadVal * divMultiplier(c) * internationalMultiplier(c));
}

/* =========================================================
   BOOT
   ========================================================= */
init();
</script>
