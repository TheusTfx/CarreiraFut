<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>CarreiraFUT Brasil Manager Total</title>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;600;700&family=Roboto+Condensed:wght@300;400;700&family=Roboto:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#070910;--bg2:#101522;--bg3:#171d2d;--bg4:#20283b;
  --border:#2a344a;--border2:#3a4a66;
  --acc:#00c4ff;--gold:#f5c518;--grn:#00e676;--red:#ff1744;--org:#ff9100;--pur:#a855f7;
  --txt:#e8edf8;--txt2:#9aa6bd;--txt3:#65718a;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--txt);font-family:Roboto,sans-serif;font-size:13px}
button,select,input,textarea{font-family:inherit}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:var(--bg2)}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:4px}
#root{display:flex;flex-direction:column;height:100vh}
#topbar{height:54px;background:linear-gradient(135deg,#090d18,#151c2b);border-bottom:2px solid var(--acc);display:flex;align-items:stretch;box-shadow:0 4px 20px rgba(0,196,255,.12);z-index:5}
.tb-logo{display:flex;align-items:center;padding:0 24px 0 14px;background:var(--acc);clip-path:polygon(0 0,calc(100% - 14px) 0,100% 100%,0 100%);font-family:Oswald,sans-serif;font-size:1.18rem;font-weight:700;color:#001018;letter-spacing:1.4px;white-space:nowrap}
.tb-seg{display:flex;align-items:center;padding:0 14px;border-right:1px solid var(--border);gap:8px;min-width:94px}
.tb-seg.flex{flex:1;min-width:180px}
.lbl{font-size:9px;color:var(--txt3);text-transform:uppercase;letter-spacing:1px}
.val{font-family:Oswald,sans-serif;font-size:1.05rem;color:var(--gold)}
.val.g{color:var(--grn)}.val.a{color:var(--acc)}
.tb-cname{font-family:Oswald,sans-serif;font-size:1rem;font-weight:600}
.tb-csub{font-size:10px;color:var(--txt2)}
#nav{background:var(--bg2);border-bottom:1px solid var(--border);display:flex;overflow-x:auto;flex-shrink:0}
#nav button{background:none;border:none;color:var(--txt3);padding:9px 14px;cursor:pointer;white-space:nowrap;font-family:"Roboto Condensed",sans-serif;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1px;border-bottom:3px solid transparent}
#nav button:hover{color:var(--txt);background:rgba(255,255,255,.035)}
#nav button.active{color:var(--acc);border-bottom-color:var(--acc)}
#main{display:flex;flex:1;overflow:hidden}
#sidebar{width:230px;min-width:230px;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow-y:auto}
#content{flex:1;overflow-y:auto;padding:14px;background:radial-gradient(circle at top right,rgba(0,196,255,.045),transparent 38%),var(--bg)}
.sb-sec{padding:10px;border-bottom:1px solid var(--border)}
.sb-ttl{font-size:9px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--txt3);margin-bottom:7px}
.sb-next,.mini-card{background:var(--bg3);border-radius:7px;padding:10px;border:1px solid var(--border)}
.tag{font-size:9px;font-weight:700;letter-spacing:1px;text-transform:uppercase;padding:2px 6px;border-radius:3px;display:inline-block}
.tag-A{background:rgba(0,196,255,.15);color:var(--acc)}.tag-B{background:rgba(168,85,247,.15);color:var(--pur)}
.tag-C{background:rgba(255,145,0,.15);color:var(--org)}.tag-D{background:rgba(245,197,24,.15);color:var(--gold)}
.tag-R{background:rgba(0,230,118,.15);color:var(--grn)}.tag-COPA{background:rgba(245,197,24,.18);color:var(--gold)}
.sb-btn,.btn{border:none;border-radius:5px;cursor:pointer;font-family:"Roboto Condensed",sans-serif;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1px;transition:.15s;display:inline-flex;align-items:center;justify-content:center;gap:6px}
.sb-btn,.bac{background:var(--acc);color:#001018;padding:8px 14px}
.bac:hover,.sb-btn:hover{background:#39d4ff;transform:translateY(-1px)}
.bgd{background:var(--gold);color:#111;padding:8px 14px}.bgr{background:var(--grn);color:#001;padding:8px 14px}
.brd{background:var(--red);color:#fff;padding:8px 14px}.bpu{background:var(--pur);color:#fff;padding:8px 14px}.bgh{background:var(--bg3);border:1px solid var(--border2);color:var(--txt2);padding:7px 12px}
.bgh:hover{color:var(--txt);border-color:var(--acc)}
.btn:disabled{opacity:.45;cursor:not-allowed;transform:none!important}
.fi{padding:5px 0;border-bottom:1px solid rgba(255,255,255,.045);font-size:11px;color:var(--txt2);line-height:1.45}
.fi .hi{color:var(--txt);font-weight:600}.fi .w{color:var(--grn)}.fi .l{color:var(--red)}.fi .g{color:var(--gold)}.fi .a{color:var(--acc)}
.card{background:rgba(16,21,34,.96);border:1px solid var(--border);border-radius:9px;padding:14px;margin-bottom:12px;box-shadow:0 10px 28px rgba(0,0,0,.18)}
.card-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;padding-bottom:10px;border-bottom:1px solid var(--border);gap:10px}
.card-title{font-family:Oswald,sans-serif;font-size:1rem;font-weight:600;letter-spacing:.7px;display:flex;align-items:center;gap:7px}
.card-sub{font-size:11px;color:var(--txt2)}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:12px}.g3{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
.gg{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:12px}
.sbox{background:var(--bg3);border:1px solid var(--border);border-radius:7px;padding:12px;text-align:center}
.sbox .n{font-family:Oswald,sans-serif;font-size:1.8rem;font-weight:700;line-height:1}
.sbox .l{font-size:10px;color:var(--txt2);margin-top:4px;text-transform:uppercase;letter-spacing:.8px}
.tbl{width:100%;border-collapse:collapse}
.tbl th{background:var(--bg3);color:var(--txt3);font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:1px;padding:7px;text-align:center;position:sticky;top:0;z-index:1}
.tbl th:first-child,.tbl th:nth-child(2){text-align:left}
.tbl td{padding:6px 7px;text-align:center;border-bottom:1px solid rgba(255,255,255,.035);font-size:12px}
.tbl td:nth-child(2){text-align:left}
.tbl tr:hover td{background:rgba(255,255,255,.035)}
.tbl tr.meu td{background:rgba(0,196,255,.075)}
.tbl tr.meu td:first-child{border-left:3px solid var(--acc)}
.pts{font-family:Oswald,sans-serif;font-size:1rem;color:var(--gold);font-weight:700}
.cc{display:flex;align-items:center;gap:6px}.cn{font-family:"Roboto Condensed",sans-serif;font-weight:700;font-size:12px}
.badge{font-size:1.15rem}.plib{color:var(--grn);font-weight:700}.psul{color:#26c6da;font-weight:700}.prel{color:var(--red);font-weight:700}.pris{color:var(--org);font-weight:700}
.tabs{display:flex;border-bottom:1px solid var(--border);margin-bottom:12px;gap:0;overflow-x:auto}
.tab{background:none;border:none;color:var(--txt3);padding:8px 14px;cursor:pointer;font-family:"Roboto Condensed",sans-serif;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1px;border-bottom:2px solid transparent;margin-bottom:-1px;white-space:nowrap}
.tab:hover{color:var(--txt)}.tab.active{color:var(--acc);border-bottom-color:var(--acc)}
.prow{display:flex;align-items:center;gap:8px;padding:6px 4px;border-bottom:1px solid rgba(255,255,255,.04);border-radius:4px}
.prow:hover{background:rgba(255,255,255,.035)}
.pb{font-size:9px;font-weight:700;padding:2px 5px;border-radius:3px;text-transform:uppercase;width:34px;text-align:center}
.pos-GOL{background:rgba(245,197,24,.2);color:var(--gold)}.pos-ZAG{background:rgba(33,150,243,.2);color:#42a5f5}.pos-LAT{background:rgba(0,188,212,.2);color:#26c6da}.pos-VOL{background:rgba(156,39,176,.2);color:#ba68c8}.pos-MEI{background:rgba(0,230,118,.2);color:var(--grn)}.pos-ATA{background:rgba(255,23,68,.2);color:#ff5252}
.pnm{flex:1;font-family:"Roboto Condensed",sans-serif;font-weight:700;font-size:13px}.page{color:var(--txt3);font-size:11px;width:25px}
.ovr{font-family:Oswald,sans-serif;font-size:1rem;font-weight:700;padding:2px 7px;border-radius:4px;min-width:34px;text-align:center}
.oe{background:rgba(245,197,24,.2);color:var(--gold);border:1px solid rgba(245,197,24,.35)}.oh{background:rgba(0,230,118,.15);color:var(--grn);border:1px solid rgba(0,230,118,.3)}.om{background:rgba(0,196,255,.12);color:var(--acc);border:1px solid rgba(0,196,255,.25)}.ol{background:rgba(255,255,255,.06);color:var(--txt2);border:1px solid var(--border)}
.score{background:linear-gradient(135deg,#0b101d,#141c2d);border:1px solid var(--border2);border-radius:10px;padding:18px;text-align:center;position:relative;overflow:hidden}
.score:before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at top,rgba(0,196,255,.08),transparent 65%);pointer-events:none}
.sc-comp{font-size:10px;letter-spacing:2px;font-weight:700;text-transform:uppercase;color:var(--txt3);margin-bottom:10px}
.sc-teams{display:flex;align-items:center;justify-content:center;gap:16px;position:relative}
.sc-team{display:flex;flex-direction:column;align-items:center;gap:3px;flex:1}
.sc-team .bdg{font-size:2.4rem}.sc-team .nm{font-family:Oswald,sans-serif;font-size:1.12rem;font-weight:700}.sc-team .ov{font-size:11px;color:var(--txt3)}
.sc-nums{font-family:Oswald,sans-serif;font-size:3.2rem;font-weight:700;color:var(--gold);line-height:1;display:flex;gap:8px;align-items:center}.dash{color:var(--txt3);font-size:1.8rem}
.narr{background:var(--bg2);border:1px solid var(--border);border-radius:8px;height:270px;overflow-y:auto;padding:10px}
.nl{display:flex;gap:8px;padding:6px 0;border-bottom:1px solid rgba(255,255,255,.04)}
.min{font-family:Oswald,sans-serif;color:var(--txt3);width:34px;text-align:right;flex-shrink:0}.nt{font-size:12px;color:var(--txt2);line-height:1.5}
.eg{color:var(--gold);font-weight:700}.er{color:var(--red)}.en{color:var(--grn);font-weight:700}.ea{color:var(--acc)}
.mkc{background:var(--bg3);border:1px solid var(--border);border-radius:7px;padding:10px;margin-bottom:8px;display:flex;align-items:center;gap:10px}
.mkc:hover{border-color:var(--acc)}.mkp{font-family:Oswald,sans-serif;font-size:1.05rem;color:var(--grn);font-weight:700}.small{font-size:11px}.muted{color:var(--txt2)}.bold{font-weight:700}.acc{color:var(--acc)}.gold{color:var(--gold)}.grn{color:var(--grn)}.red{color:var(--red)}.org{color:var(--org)}
.dv{height:1px;background:var(--border);margin:10px 0}.mt8{margin-top:8px}.mb8{margin-bottom:8px}.mt12{margin-top:12px}
.mov{position:fixed;inset:0;background:rgba(0,0,0,.86);display:flex;align-items:center;justify-content:center;z-index:50;backdrop-filter:blur(8px)}
.mdl{background:var(--bg2);border:1px solid var(--border2);border-radius:13px;padding:24px;width:680px;max-width:96vw;max-height:90vh;overflow-y:auto;box-shadow:0 24px 90px rgba(0,0,0,.85)}
.mdl h2{font-family:Oswald,sans-serif;font-size:1.5rem;color:var(--acc);margin-bottom:4px}.mdl p.sub{color:var(--txt2);font-size:12px;margin-bottom:14px}
.mdl select,.mdl input[type=text]{width:100%;background:var(--bg3);border:1px solid var(--border2);color:var(--txt);padding:10px 11px;border-radius:6px;font-size:13px;margin-bottom:10px}
.mdl select:focus,.mdl input:focus{outline:none;border-color:var(--acc)}
.step{font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--txt3);margin-bottom:6px;margin-top:10px}
.prev{background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:14px;margin:10px 0}
.hidden{display:none!important}
#notif{position:fixed;top:62px;right:14px;z-index:100;display:flex;flex-direction:column;gap:7px;pointer-events:none}
.notif{background:var(--bg2);border:1px solid var(--border2);border-left:4px solid var(--acc);border-radius:8px;padding:11px 14px;min-width:270px;animation:sin .25s ease,sout .3s 3.8s forwards;box-shadow:0 8px 30px rgba(0,0,0,.6)}
.notif.win{border-left-color:var(--grn)}.notif.loss{border-left-color:var(--red)}.notif.gold{border-left-color:var(--gold)}
.notif .t{font-family:Oswald,sans-serif;margin-bottom:2px}.notif .s{font-size:11px;color:var(--txt2)}
@keyframes sin{from{opacity:0;transform:translateX(18px)}to{opacity:1;transform:none}}@keyframes sout{to{opacity:0;transform:translateX(18px)}}
.pitch{background:linear-gradient(180deg,#123e1b,#0e2f16);border:1px solid rgba(255,255,255,.15);border-radius:8px;height:465px;position:relative;overflow:hidden}
.pitch:before{content:'';position:absolute;inset:18px;border:1px solid rgba(255,255,255,.35)}
.pitch:after{content:'';position:absolute;left:50%;top:18px;bottom:18px;border-left:1px solid rgba(255,255,255,.25)}
.circle{position:absolute;left:50%;top:50%;width:110px;height:110px;margin:-55px;border:1px solid rgba(255,255,255,.25);border-radius:50%}
.pchip{position:absolute;transform:translate(-50%,-50%);text-align:center}
.pjer{font-size:1.4rem}.pname{font-size:10px;background:rgba(0,0,0,.55);border-radius:4px;padding:2px 5px;margin-top:1px;white-space:nowrap}
.kit{height:120px;border-radius:12px;border:1px solid var(--border2);background:var(--kitbg);display:flex;align-items:center;justify-content:center;font-family:Oswald,sans-serif;font-size:2rem;color:#fff;text-shadow:0 2px 8px #000;position:relative;overflow:hidden}
.kit:after{content:attr(data-sponsor);position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:1rem;background:rgba(0,0,0,.35);padding:4px 10px;border-radius:5px}
input[type=color]{width:46px;height:32px;background:transparent;border:1px solid var(--border2);border-radius:5px;padding:2px}
.form-row{display:flex;align-items:center;gap:8px;margin-bottom:8px}.form-row label{width:120px;color:var(--txt2);font-size:11px}
input[type=file]{font-size:11px;color:var(--txt2)}
.news{background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:12px;margin-bottom:10px}
.news-top{display:flex;justify-content:space-between;gap:8px;align-items:center;margin-bottom:6px}
.news h3{font-family:Oswald,sans-serif;font-size:1rem;margin-bottom:5px}.news p{font-size:12px;color:var(--txt2);line-height:1.55}
.meter{height:7px;background:rgba(255,255,255,.08);border-radius:6px;overflow:hidden}.meter>div{height:100%;background:var(--acc);border-radius:6px}
@media(max-width:900px){#sidebar{display:none}.g2,.g3,.g4{grid-template-columns:1fr}.tb-seg{padding:0 8px;min-width:auto}.tb-logo{font-size:1rem}.card{padding:11px}.pitch{height:410px}}

/* ================= HIGH-TECH / FIFA-LIKE VISUAL UPGRADE ================= */
:root{
  --bg:#040914;--bg2:#07111f;--bg3:#0c1a2d;--bg4:#12243d;
  --border:rgba(108,146,190,.22);--border2:rgba(0,196,255,.38);
  --glass:rgba(8,19,35,.72);--glass2:rgba(11,29,53,.82);
  --acc:#00d7ff;--gold:#ffd166;--grn:#10f58b;--red:#ff4d6d;--org:#ffad33;--pur:#a78bfa;
  --txt:#ecf6ff;--txt2:#9fb5cc;--txt3:#66819d;
}
body{
  background:
    radial-gradient(circle at 80% 0%,rgba(0,215,255,.12),transparent 30%),
    radial-gradient(circle at 12% 18%,rgba(60,90,255,.10),transparent 25%),
    linear-gradient(180deg,#030712,#06111f 60%,#040914);
}
#topbar{
  background:linear-gradient(90deg,rgba(5,12,24,.96),rgba(7,22,40,.92));
  border-bottom:1px solid rgba(0,215,255,.55);
  box-shadow:0 12px 40px rgba(0,0,0,.55),0 0 30px rgba(0,215,255,.10);
  backdrop-filter:blur(12px);
}
.tb-logo{
  background:linear-gradient(135deg,#00d7ff,#6ee7ff);
  color:#02111d;
  text-shadow:none;
}
#nav{
  background:rgba(5,13,25,.86);
  backdrop-filter:blur(10px);
  border-bottom:1px solid rgba(255,255,255,.06);
}
#nav button{
  border-bottom:2px solid transparent;
  color:#7894ad;
}
#nav button.active{
  color:#fff;
  background:linear-gradient(180deg,rgba(0,215,255,.10),rgba(0,215,255,.02));
  border-bottom-color:var(--acc);
  box-shadow:inset 0 -12px 20px rgba(0,215,255,.05);
}
#sidebar{background:rgba(5,13,25,.78);backdrop-filter:blur(12px)}
#content{
  background:
    linear-gradient(120deg,rgba(0,215,255,.06),transparent 26%),
    radial-gradient(circle at 70% 12%,rgba(80,120,255,.08),transparent 30%),
    #040914;
}
.card,.mini-card,.sb-next,.sbox,.news,.mkc{
  background:linear-gradient(180deg,rgba(10,25,46,.82),rgba(5,14,28,.82));
  border:1px solid rgba(120,170,220,.18);
  box-shadow:0 18px 45px rgba(0,0,0,.28), inset 0 1px 0 rgba(255,255,255,.035);
  backdrop-filter:blur(10px);
}
.card{border-radius:16px}
.sbox{border-radius:14px}
.btn{border-radius:10px}
.bac{background:linear-gradient(135deg,#00d7ff,#70eaff);box-shadow:0 10px 30px rgba(0,215,255,.18)}
.bgd{background:linear-gradient(135deg,#ffd166,#ffe08a)}
.bgh{background:rgba(11,29,53,.72)}
.tbl th{background:rgba(10,28,51,.95)}
.tbl td{border-bottom:1px solid rgba(255,255,255,.045)}
.score{
  border-radius:18px;
  background:
    radial-gradient(circle at 50% 0%,rgba(0,215,255,.18),transparent 52%),
    linear-gradient(135deg,rgba(8,25,46,.96),rgba(3,10,21,.96));
  border:1px solid rgba(0,215,255,.28);
}
.matchShell{display:grid;grid-template-columns:1.35fr .85fr;gap:14px}
.broadcast{
  background:
    radial-gradient(circle at 50% 0%,rgba(0,215,255,.15),transparent 40%),
    linear-gradient(135deg,rgba(7,21,40,.98),rgba(4,10,20,.98));
  border:1px solid rgba(0,215,255,.25);
  border-radius:20px;
  padding:18px;
  overflow:hidden;
  position:relative;
  box-shadow:0 24px 80px rgba(0,0,0,.34);
}
.broadcast:before{
  content:'';
  position:absolute;
  inset:-2px;
  background:linear-gradient(110deg,transparent,rgba(0,215,255,.12),transparent);
  transform:translateX(-70%);
  animation:scanline 7s infinite;
  pointer-events:none;
}
@keyframes scanline{0%{transform:translateX(-70%)}55%{transform:translateX(90%)}100%{transform:translateX(90%)}}
.matchTop{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;position:relative;z-index:1}
.matchBadge{font-size:10px;text-transform:uppercase;letter-spacing:2px;color:#9cc9df}
.matchClock{
  font-family:Oswald,sans-serif;
  background:rgba(0,215,255,.13);
  border:1px solid rgba(0,215,255,.28);
  border-radius:999px;
  padding:5px 12px;
  color:#dffbff;
}
.matchScore{
  display:grid;
  grid-template-columns:1fr auto 1fr;
  align-items:center;
  gap:18px;
  position:relative;
  z-index:1;
}
.teamPanel{text-align:center}
.teamPanel .crest{font-size:3.4rem;filter:drop-shadow(0 8px 18px rgba(0,0,0,.5))}
.teamPanel .name{font-family:Oswald,sans-serif;font-size:1.35rem;font-weight:700;margin-top:4px}
.teamPanel .meta{font-size:11px;color:var(--txt2)}
.scoreNums{
  font-family:Oswald,sans-serif;
  font-size:4.8rem;
  font-weight:700;
  letter-spacing:4px;
  color:#fff;
  text-shadow:0 0 24px rgba(0,215,255,.28);
  min-width:190px;
  text-align:center;
}
.livePill{
  display:inline-flex;align-items:center;gap:6px;
  background:rgba(255,77,109,.18);
  border:1px solid rgba(255,77,109,.35);
  color:#ffdce3;
  border-radius:999px;
  padding:4px 9px;
  font-size:10px;
  text-transform:uppercase;
  letter-spacing:1px;
}
.livePill:before{content:'';width:7px;height:7px;border-radius:50%;background:var(--red);box-shadow:0 0 12px var(--red)}
.matchPitchMini{
  margin-top:16px;
  height:170px;
  border-radius:16px;
  background:
    linear-gradient(90deg,rgba(255,255,255,.08) 1px,transparent 1px),
    linear-gradient(0deg,rgba(255,255,255,.06) 1px,transparent 1px),
    linear-gradient(180deg,#0d5a34,#084527);
  background-size:38px 38px,38px 38px,auto;
  border:1px solid rgba(255,255,255,.13);
  position:relative;
  overflow:hidden;
}

function makeSquad(c){
  const pos=['GOL','GOL','ZAG','ZAG','ZAG','LAT','LAT','LAT','VOL','VOL','MEI','MEI','MEI','ATA','ATA','ATA','ATA','MEI'];
  const first=['João','Lucas','Rafael','Pedro','Gabriel','Bruno','Matheus','Felipe','Gustavo','Diego','Caio','Murilo','Thiago','Daniel','André','Vinícius','Otávio','Renan','Henrique','Samuel'];
  const last=['Silva','Souza','Oliveira','Santos','Pereira','Costa','Ferreira','Almeida','Rodrigues','Lima','Gomes','Ribeiro','Carvalho','Moura','Nunes','Rocha'];
  return pos.map((p,idx)=>{
    const ov=clamp(c.overall+rand(-8,5)+(idx<11?2:0),42,91), age=rand(17,35);
    const pot=clamp(ov+rand(-2,12)-(age>30?rand(2,8):0),45,94);
    const base=Math.round((ov*ov*ov)*(c.div=='A'?55:c.div=='B'?28:c.div=='C'?12:c.div=='D'?5:2));
    return {id:players.length+idx+Math.random(),club:c.id,name:pick(first)+' '+pick(last),pos:p,age,ovr:ov,pot,moral:rand(45,80),fit:rand(70,100),value:base,salary:Math.round(base/90),contract:2025+rand(1,4),games:0,goals:0,assists:0,avg:6.5,trend:0,history:[],family:rand(35,90),emotional:rand(35,90),professional:rand(35,90),leadership:rand(25,85),minutes:0,injury:0,listed:false};
  });
}

function club(id){return clubs.find(c=>c.id==id)}

function P(page){

function lineupValidation(){
 const ps=myPlayers().filter(p=>state.lineup.includes(p.id));
 const gk=ps.filter(p=>p.pos=='GOL').length;
 if(ps.length!==11)return `Escalação inválida: precisa ter 11 jogadores. Atual: ${ps.length}.`;
 if(gk!==1)return `Escalação inválida: precisa ter exatamente 1 goleiro. Atual: ${gk}.`;
 if(ps.some(p=>!isAvailable(p)))return `Escalação inválida: há jogador lesionado, suspenso ou indisponível.`;
 return '';

function calcLog(n=nextOpponent()){

 const hotelKey=c.div=='A'?'premium':c.div=='B'?'executive':'economic';
 const foodKey=c.div=='A'?'nutrition':c.div=='B'?'standard':'basic';
 const hotel={economic:[90,-5,'Hotel econômico'],standard:[180,0,'Hotel padrão'],executive:[320,4,'Hotel executivo'],premium:[650,8,'Hotel premium']}[hotelKey];
 const food={basic:[55,-2],standard:[100,0],nutrition:[190,3]}[foodKey];

 const cost=Math.round((n.dist*trans[0]*people/10 + hotel[0]*people*days + food[0]*people*days)*porte);

 return {cost,fatigue,emotional,note:`${trans[2]}, ${hotel[2]}, ${days} dia(s) fora. Série ${c.div}: custos ajustados por porte do clube.`};
}

function simulateMatch(a,b,aHome,isMine,log){
 const fa=a.overall+(aHome?3:0)+(isMine?teamLineupAvg()-a.overall:0)+(a.morale-60)/8;
 const fb=b.overall+(!aHome?3:0)+(b.morale-60)/10;
 let ga=Math.max(0,Math.round((Math.random()*2.5)+(fa-fb)/18)); let gb=Math.max(0,Math.round((Math.random()*2.5)+(fb-fa)/18));
 if(Math.random()<0.12)ga++; if(Math.random()<0.12)gb++;
 applyTable(a,b,ga,gb);
 if(isMine){
  const win=ga>gb, draw=ga==gb; const resultText=win?'vitória':draw?'empate':'derrota';
  const emotional=(log?.emotional||0)+(win?8:draw?2:-8)-Math.round((log?.fatigue||0)/5);
  a.morale=clamp(a.morale+emotional,0,100);
  lastMatch={a,b,ga,gb,home:aHome,result:resultText,log};
  updatePlayerStats(win,draw,log,ga);
  lastReport=makeReport(ga,gb,win,draw,log);
  addFeed(`<span class="${win?'w':draw?'g':'l'}">${a.name} ${ga} x ${gb} ${b.name}</span> — ${resultText}.`);
  addNews('Rodada',`${a.name} ${ga} x ${gb} ${b.name}`,`O resultado mexe com a tabela do ${labelDiv(a.div)}. ${lastReport.summary}`,'rodada');
  notify('Partida encerrada',`${a.name} ${ga} x ${gb} ${b.name}`,win?'win':draw?'gold':'loss');
 }
}

function applyTable(a,b,ga,gb){a.j++;b.j++;a.gp+=ga;a.gc+=gb;b.gp+=gb;b.gc+=ga;if(ga>gb){a.v++;b.d++;a.pts+=3;a.form.unshift('V');b.form.unshift('D')}else if(ga<gb){b.v++;a.d++;b.pts+=3;b.form.unshift('V');a.form.unshift('D')}else{a.e++;b.e++;a.pts++;b.pts++;a.form.unshift('E');b.form.unshift('E')}a.form=a.form.slice(0,5);b.form=b.form.slice(0,5)}
function updatePlayerStats(win,draw,log,goals){
 const lineup=myPlayers().filter(p=>state.lineup.includes(p.id)); let scorers=[...lineup].sort(()=>Math.random()-.5).slice(0,goals);
 lineup.forEach(p=>{p.games++;p.minutes+=rand(65,95);p.fit=clamp(p.fit-(log?.fatigue||5)+rand(-4,3),30,100);let note=6+rand(-12,14)/10+(win?0.6:draw?0:-0.5)+((p.moral-60)/50);p.avg=+(p.avg*0.75+note*0.25).toFixed(2);p.moral=clamp(p.moral+(win?rand(2,7):draw?rand(-1,3):rand(-7,0))+(log?.emotional||0)/4,0,100);p.trend=clamp(p.trend+(note>7?1:note<5.8?-1:0),-5,5); evolvePlayerAfterMatch(p,true,note>7.2);});
 scorers.forEach(p=>{p.goals++;p.trend++;p.moral=clamp(p.moral+5,0,100); evolvePlayerAfterMatch(p,true,true)});
 recalcValues();
}

function closeNegotiation(){ const el=document.getElementById('neg-modal'); if(el)el.remove(); neg=null; }
function refreshNeg(){ const el=document.getElementById('neg-modal'); if(el)el.remove(); renderNegotiation(); }
function autoAdjustOffer(){
 const p=players.find(x=>x.id==neg.pid), t=neg.offer.type;
 neg.offer.cash=Math.round(p.value*(t=='compra'?1:t=='parcelado'?.25:t=='emprestimo_sem_custo'?0:t=='emprestimo_pago'?.08:t=='opcao_compra'?.08:t=='percentual_futuro'?.55:t=='jogador_mais_dinheiro'?.35:t=='quitacao_divida'?.12:.1));
 neg.offer.future=t=='percentual_futuro'?20:0; neg.offer.installments=t=='parcelado'?12:0; neg.offer.debt=t=='quitacao_divida'?Math.round(p.value*.6):0;
}
function negotiationScore(){
 const p=players.find(x=>x.id==neg.pid), seller=club(p.club), c=myClub(), o=neg.offer;
 const out=players.find(x=>String(x.id)==String(o.playerOut));
 let packageValue=(+o.cash||0)+(+o.debt||0)+(out?out.value*.78:0)+(+o.future||0)*p.value/180;
 if(o.type=='emprestimo_sem_custo')packageValue=p.value*.10;
 if(o.type=='emprestimo_pago')packageValue=(+o.cash||0)*2.2;
 if(o.type=='opcao_compra')packageValue=(+o.cash||0)*2 + p.value*.35;
 if(o.type=='parcelado')packageValue=(+o.cash||0)*1.25 + (o.installments? p.value*.20:0);
 let need=p.value*(seller.cash<5000000?.88:1.02);
 let score=50+(packageValue-need)/Math.max(1,p.value)*70+(c.rep-seller.rep)*.8+(neg.round>1?5:0);
 if(c.cash<(+o.cash||0))score-=45;
 if(o.type.includes('emprestimo'))score+=10;
 return clamp(Math.round(score),0,100);
}
function negotiationRead(){
 const sc=negotiationScore();
 if(sc>=78)return 'Proposta muito forte. O clube vendedor tende a aceitar.';
 if(sc>=55)return 'Proposta negociável. Pode vir contraproposta.';
 if(sc>=35)return 'Proposta fraca. Será preciso melhorar dinheiro, incluir atleta ou percentual.';
 return 'Proposta muito baixa ou inviável pelo seu caixa.';
}
function sendNegotiationOffer(){
 const p=players.find(x=>x.id==neg.pid), seller=club(p.club), c=myClub(), sc=negotiationScore(), o=neg.offer;
 neg.chat.push(['me',`${c.name}: proposta por ${p.name} — ${dealName(o.type)}, ${BRL(+o.cash||0)}${o.future?`, ${o.future}% venda futura`:''}${o.playerOut?`, atleta na troca`:''}${o.debt?`, abatendo dívida de ${BRL(o.debt)}`:''}.`]);
 if(c.cash<(+o.cash||0)){neg.chat.push(['club',`${seller.name}: vocês não têm caixa para honrar essa proposta.`]); refreshNeg(); return;}
 if(sc>=74 || (sc>=62 && Math.random()<.55)){
   acceptNegotiation();
   return;
 }
 if(sc>=42){
   neg.round++;
   const ask=Math.round((p.value*(seller.cash<5000000?.9:1.05))-(+o.cash||0));
   neg.chat.push(['club',`${seller.name}: a conversa existe, mas precisamos de melhoria. Subam ${BRL(Math.max(100000,ask*.35))} ou incluam percentual/jogador.`]);
 }else{
   neg.round++;
   neg.chat.push(['club',`${seller.name}: nesses termos não avançamos. A proposta está distante da nossa avaliação.`]);
 }
 refreshNeg();
}
function improveOffer(){
 const p=players.find(x=>x.id==neg.pid);
 neg.offer.cash=Math.round((+neg.offer.cash||0)+p.value*.12);
 if(neg.offer.future<20)neg.offer.future+=5;
 neg.chat.push(['me',`Melhoramos a composição: mais dinheiro e/ou percentual futuro.`]);
 refreshNeg();
}

let matchTimer=null;
function startAutoClock(){
 const live=state?.liveMatch;
 if(!live||live.finished||live.phase=='halftime')return;
 stopAutoClock();
 live.auto=true;
 const speed=state.prefs?.matchSpeed||3;
 const delay=Math.max(350,1500-(speed*120));
 matchTimer=setInterval(()=>{
   const lm=state.liveMatch;
   if(!lm||lm.finished){stopAutoClock(); if(lm&&lm.finished&&!lm.postShown){lm.postShown=true; openPostMatchModal();} return;}
   const beforeEvents=lm.events.length;
   advanceMatchAuto();
   const last=lm.events[lm.events.length-1];
   if(last && ((state.prefs?.autoPauseInjury&&last.type=='injury') || (state.prefs?.autoPauseCard&&['yellow','red'].includes(last.type)))){
     stopAutoClock();
     notify('Partida pausada',last.type=='injury'?'Lesão detectada. Avalie substituição.':'Cartão importante. Reavalie a estratégia.','gold');
   }
 },delay);
}
function stopAutoClock(){
 if(matchTimer){clearInterval(matchTimer);matchTimer=null;}
 if(state?.liveMatch)state.liveMatch.auto=false;
}
function toggleAutoClock(){
 if(matchTimer)stopAutoClock(); else startAutoClock();
 P('partida');
}
function advanceMatchAuto(){
 const live=state.liveMatch; if(!live||live.finished)return;
 const speed=state.prefs?.matchSpeed||3;
 const inc=Math.max(2,Math.round(speed*1.15));
 const limit=90+(live.added||0);
 const target=Math.min(limit,live.minute+inc);
 while(live.minute<target){
   live.minute+=rand(1,3);
   if(live.minute>target)live.minute=target;
   simulateLiveEvent(live);
   const last=live.events[live.events.length-1];
   if(last && ((state.prefs?.autoPauseInjury&&last.type=='injury') || (state.prefs?.autoPauseCard&&['yellow','red'].includes(last.type)))) break;
 }
 if(live.minute>=limit){
   live.minute=limit; live.finished=true; stopAutoClock();
   live.events.push({min:`90+${live.added||0}`,type:'end',txt:'Fim de jogo. O painel final de estatísticas foi aberto automaticamente.'});
 }
 P('partida');
}

 return `<div class="g3"><div class="mini-card"><b>Velocidade da partida</b><select class="negInput mt8" onchange="state.prefs.matchSpeed=+this.value;if(matchTimer){startAutoClock()}P('preferencias')">${[1,2,3,4,5,6,8,10].map(x=>`<option value="${x}" ${state.prefs.matchSpeed==x?'selected':''}>${x}x</option>`).join('')}</select><div class="small muted mt8">Controla quantos minutos avançam por clique.</div></div><div class="mini-card"><b>Pausar em lesão</b><div class="mt8"><button class="btn ${state.prefs.autoPauseInjury?'bgr':'bgh'}" onclick="state.prefs.autoPauseInjury=!state.prefs.autoPauseInjury;P('preferencias')">${state.prefs.autoPauseInjury?'Ativado':'Desativado'}</button></div></div><div class="mini-card"><b>Pausar em cartões</b><div class="mt8"><button class="btn ${state.prefs.autoPauseCard?'bgr':'bgh'}" onclick="state.prefs.autoPauseCard=!state.prefs.autoPauseCard;P('preferencias')">${state.prefs.autoPauseCard?'Ativado':'Desativado'}</button></div></div></div>`;
}
function openPreferences(){
 const html=`<div class="prefOverlay" id="pref-modal"><div class="prefBox"><div class="negHeader"><div><div class="negTitle">Preferências da Partida</div><div class="small muted">Ajuste velocidade sem sair do jogo.</div></div><button class="btn brd" onclick="document.getElementById('pref-modal').remove()">Fechar</button></div>${prefContent()}</div></div>`;
 document.body.insertAdjacentHTML('beforeend',html);
}
function openPostMatchModal(){
 const live=state.liveMatch; if(!live||!live.finished)return;
 const home=club(live.homeTeam), away=club(live.awayTeam);
 const html=`<div class="postOverlay" id="post-modal"><div class="postBox"><div class="postHero"><div class="card-title">🏁 Fim de jogo</div><div class="scoreNums" style="font-size:3rem;text-align:left">${home.name} ${live.homeGoals} x ${live.awayGoals} ${away.name}</div><div class="small muted">90 minutos + ${live.added||0} de acréscimos. Confira estatísticas e eventos antes de confirmar o resultado.</div></div>${renderMatchStats(live)}<div class="card"><div class="card-hd"><div class="card-title">🎙 Eventos do jogo</div></div><div class="timeline">${live.events.slice().reverse().map(renderEvent).join('')}</div></div><div class="negGrid3 mt12"><button class="btn bac" onclick="document.getElementById('post-modal').remove();confirmMatchResult()">Confirmar e avançar</button><button class="btn bgh" onclick="document.getElementById('post-modal').remove()">Ver tela da partida</button></div></div></div>`;
 document.body.insertAdjacentHTML('beforeend',html);
}
function initSeasonCalendar() {
  const c = myClub();
  const divClubs = clubs.filter(x => x.div == c.div && x.id != c.id);
  const days = ['Sábado', 'Domingo', 'Quarta-feira'];
  const times = ['16:00', '18:30', '20:00', '21:00'];
  const calendar = [];
  let round = 1;

  // Jogos da liga nacional/regional
  divClubs.forEach(opp => {
    // Jogo em casa
    calendar.push({
      id: `${round}-${c.id}-${opp.id}`,
      round,
      opp: opp.id,
      home: true,
      comp: c.div,
      label: labelDiv(c.div),
      type: 'league',
      day: pick(days),
      time: pick(times),
      status: 'open',
      dist: distance(c.estado, opp.estado),
      playable: true
    });
    round++;

    // Jogo fora
    calendar.push({
      id: `${round}-${opp.id}-${c.id}`,
      round,
      opp: opp.id,
      home: false,
      comp: c.div,
      label: labelDiv(c.div),
      type: 'league',
      day: pick(days),
      time: pick(times),
      status: 'open',
      dist: distance(c.estado, opp.estado),
      playable: true
    });
    round++;
  });

  // Determinar vagas internacionais com base na divisão
  const hasLib = c.div == 'A';
  const hasSul = c.div == 'A' || c.div == 'B';

  if (hasLib) {
    const opponents = clubs.filter(x => x.div == 'A' && x.id != c.id).slice(0, 5);
    opponents.forEach(opp => {
      calendar.push({
        id: `LIB-${round}-${opp.id}`,
        round,
        opp: opp.id,
        home: round % 2 == 0,
        comp: 'LIB',
        label: 'Libertadores',
        type: 'international',
        day: pick(['Terça-feira', 'Quarta-feira']),
        time: '21:30',
        status: 'open',
        dist: distance(c.estado, opp.estado),
        playable: true
      });
      round++;
    });
  }

  if (hasSul) {
    const opponents = clubs.filter(x => x.div == 'A' && x.id != c.id).slice(5, 9);
    opponents.forEach(opp => {
      calendar.push({
        id: `SUL-${round}-${opp.id}`,
        round,
        opp: opp.id,
        home: round % 2 == 0,
        comp: 'SUL',
        label: 'Sul-Americana',
        type: 'international',
        day: pick(['Terça-feira', 'Quinta-feira']),
        time: '21:30',
        status: 'open',
        dist: distance(c.estado, opp.estado),
        playable: true
      });
      round++;
    });
  }

  state.calendar = calendar;

  // Registrar elegibilidade internacional
  state.intl = {
    libertadores: hasLib ? [c.id, ...clubs.filter(x => x.div == 'A').slice(0, 5).map(x => x.id)] : [],
    sulamericana: hasSul ? [c.id, ...clubs.filter(x => x.div == 'A').slice(0, 7).map(x => x.id)] : [],
    recopa: [],
    mundial: []
  };
}

function currentFixture() {
  if (!state?.calendar) return null;
  return state.calendar.find(f => f.status == 'open' && f.playable !== false) || null;
}

function sameSlotFixtures(fx) {
  if (!state?.calendar || !fx) return [];
  return state.calendar.filter(f =>
    f.id != fx.id &&
    f.round == fx.round &&
    f.comp == fx.comp &&
    f.status == 'done'
  ).slice(0, 5);
}

function simulateOtherInternational(comp, results) {
  const pool = clubs.filter(x => x.div == 'A').slice(0, 8);
  for (let i = 0; i < pool.length - 1; i += 2) {
    const a = pool[i], b = pool[i + 1];
    if (a && b) {
      const ga = rand(0, 3), gb = rand(0, 3);
      results.push({ home: a.name, away: b.name, score: `${ga} x ${gb}` });
    }
  }
}

function applyCompetitionBonus(comp, win) {
  if (!win) return;
  const c = myClub();
  const bonus = comp == 'LIB' ? 800000 : comp == 'SUL' ? 500000 : comp == 'MUN' ? 2000000 : comp == 'REC' ? 400000 : comp == 'A' ? 250000 : comp == 'B' ? 120000 : 60000;
  c.cash += bonus;
  state.finance.push(['Premiação ' + (comp == 'LIB' ? 'Libertadores' : comp == 'SUL' ? 'Sul-Americana' : labelDiv(comp)), bonus]);
}

function divMultiplier(c) {
  return c.div == 'A' ? 2.2 : c.div == 'B' ? 1.4 : c.div == 'C' ? 0.85 : c.div == 'D' ? 0.55 : 0.3;
}

function internationalMultiplier(c) {
  if (!state?.intl) return 1.0;
  if (state.intl.mundial?.includes(c.id)) return 1.5;
  if (state.intl.libertadores?.includes(c.id)) return 1.25;
  if (state.intl.sulamericana?.includes(c.id)) return 1.1;
  return 1.0;
}

function clubMarketValue(c) {
  const squad = players.filter(p => p.club == c.id);
  const squadVal = squad.reduce((a, p) => a + p.value, 0);
  return Math.round(squadVal * divMultiplier(c) * internationalMultiplier(c));
}

function evolvePlayerAfterMatch(p, played, highlight) {
  if (!played) return;
  if (p.age < 26 && p.ovr < p.pot && highlight && Math.random() < 0.12) p.ovr++;
  if (p.age > 33 && Math.random() < 0.06) p.ovr = Math.max(p.ovr - 1, 40);
}

function recalcValues() {
  players.forEach(p => {
    const c = club(p.club);
    if (!c) return;
    const base = Math.round((p.ovr * p.ovr * p.ovr) * (c.div == 'A' ? 55 : c.div == 'B' ? 28 : c.div == 'C' ? 12 : c.div == 'D' ? 5 : 2));
    const ageFactor = p.age < 23 ? 1.15 : p.age > 30 ? Math.max(0.6, 1 - (p.age - 30) * 0.06) : 1.0;
    p.value = Math.round(base * ageFactor);
  });
}
init();
